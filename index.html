            </div>
        );

        const LecturePlayer = ({ weekTitle, weekIndex, lecture, index, isCompleted, onToggleComplete, onFloatLecture, onCelebrate, attachments = [], onOpenTaskWeek }) => {
            const lectureId = lecture.id || `${weekTitle}-${lecture.title}`;
            const storagePrefix = `smartLecture:${APP_STORAGE_NAMESPACE}:${lectureId}`;
            const loadNotes = () => safeJsonParse(localStorage.getItem(`${storagePrefix}:notes`), []);
            const [notes, setNotes] = useState(loadNotes);
            const [noteTitle, setNoteTitle] = useState('');
            const [noteText, setNoteText] = useState('');
            const [pendingAudioBlob, setPendingAudioBlob] = useState(null);
            const [isToolsOpen, setIsToolsOpen] = useState(false);
            const [copyMessage, setCopyMessage] = useState('');
            const [manualCopyText, setManualCopyText] = useState('');
            const hasVideo = !!(lecture.youtubeId || lecture.fileId || lecture.previewUrl);

            useEffect(() => {
                localStorage.setItem(`${storagePrefix}:notes`, JSON.stringify(notes));
                dispatchSmarterEvent('smarter-notes-updated', { lectureId });
            }, [notes, storagePrefix, lectureId]);
            useEffect(() => {
                const reload = (event) => { if (!event.detail?.lectureId || event.detail.lectureId === lectureId) setNotes(loadNotes()); };
                window.addEventListener('smarter-notes-external-update', reload);
                return () => window.removeEventListener('smarter-notes-external-update', reload);
            }, [lectureId]);

            const showMessage = (message) => { setCopyMessage(message); window.setTimeout(() => setCopyMessage(''), 2800); };
            const addNote = async () => {
                const textValue = noteText.trim();
                const titleValue = noteTitle.trim();
                if (!textValue && !pendingAudioBlob) return showMessage('اكتب ملاحظة أو سجّل ملاحظة صوتية الأول.');
                const noteId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
                const nextNote = { id: noteId, title: titleValue || (pendingAudioBlob ? 'ملاحظة صوتية' : 'ملاحظة بدون عنوان'), text: textValue, weekIndex, weekTitle, lectureId, lectureTitle: lecture.title, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
                if (pendingAudioBlob) {
                    try { await saveAudioBlob(noteId, pendingAudioBlob); nextNote.audioId = noteId; nextNote.audioMimeType = pendingAudioBlob.type; }
                    catch (error) { return showMessage('تعذر حفظ التسجيل الصوتي على الجهاز.'); }
                }
                setNotes(prev => [nextNote, ...prev].slice(0, 300));
                setNoteTitle(''); setNoteText(''); setPendingAudioBlob(null);
                showMessage('اتحفظت في ملاحظاتك، وتقدر ترجع لها في أي وقت.');
                onCelebrate?.('note');
            };
            const updateNote = (id, patch) => setNotes(prev => prev.map(item => item.id === id ? { ...item, ...patch, updatedAt: new Date().toISOString() } : item));
            const deleteNote = async (note) => { await deleteAudioBlob(note.audioId); setNotes(prev => prev.filter(item => item.id !== note.id)); };
            const noteToText = (note) => formatSmarterEntry({ kind:'ملاحظة من المحاضرة', title:note.title || 'ملاحظة بدون عنوان', content:note.text || (note.audioId ? '[ملاحظة صوتية]' : ''), week:weekTitle, lecture:lecture.title, date:new Date(note.updatedAt || note.createdAt).toLocaleDateString('ar-EG') });
            const copyCurrentNote = async () => {
                const textValue = noteText.trim();
                if (!textValue) return showMessage('مفيش نص في صندوق الملاحظة.');
                const value = formatSmarterEntry({ kind:'ملاحظة جديدة من المحاضرة', title:noteTitle.trim() || 'ملاحظة بدون عنوان', content:textValue, week:weekTitle, lecture:lecture.title, date:new Date().toLocaleDateString('ar-EG') });
                const ok = await copyToClipboard(value); if (!ok) setManualCopyText(value);
                showMessage(ok ? 'تم نسخ الملاحظة.' : 'النسخ التلقائي اتمنع؛ النص جاهز تحت للنسخ اليدوي.');
            };
            const copySavedNote = async (note) => {
                const value = noteToText(note); const ok = await copyToClipboard(value); if (!ok) setManualCopyText(value);
                showMessage(ok ? 'تم نسخ الملاحظة.' : 'النسخ التلقائي اتمنع؛ النص جاهز تحت للنسخ اليدوي.');
            };
            const notePayload = note => ({ kind: 'ملاحظة من المحاضرة', title: note.title || 'ملاحظة بدون عنوان', content: note.text || (note.audioId ? 'تسجيل صوتي محفوظ داخل التطبيق.' : ''), week: weekTitle, lecture: lecture.title, date: new Date(note.updatedAt || note.createdAt).toLocaleDateString('ar-EG') });
            const saveNoteChanges = note => { localStorage.setItem(`${storagePrefix}:notes`, JSON.stringify(notes)); showMessage(`تم حفظ تعديلات: ${note.title || 'الملاحظة'} 💚`); };
            const saveNotesFile = () => {
                const value = notes.slice().reverse().map((note, idx) => `${idx + 1}) ${noteToText(note)}`).join('\n\n----------------\n\n');
                if (!value) return showMessage('مفيش ملاحظات محفوظة لسه.');
                const blob = new Blob([`ملاحظات ${lecture.title} - ${weekTitle}\n\n${value}`], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${lectureId}-notes.txt`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
                showMessage('تم حفظ الملاحظات النصية كملف. التسجيلات الصوتية تتحمل من داخل كل ملاحظة.');
            };
            const appendTranscript = (transcript) => setNoteText(prev => `${prev}${prev.trim() ? ' ' : ''}${transcript}`);

            return (
                <li className="lecture-player-card p-4 sm:p-6 space-y-5">
                    <div className="flex items-start gap-3">
                        <input type="checkbox" id={`lecture-${lectureId}-${index}`} checked={isCompleted} onChange={onToggleComplete} className="h-5 w-5 rounded border-gray-300 cursor-pointer flex-shrink-0 mt-1" />
                        <div className="flex-grow min-w-0">
                            <div className="flex items-center gap-2 mb-1"><span className="lecture-unit-number">{index + 1}</span><span className="text-xs font-bold text-[--accent-green]">محاضرة داخل الأسبوع</span></div>
                            <label htmlFor={`lecture-${lectureId}-${index}`} className={`text-xl sm:text-2xl font-bold cursor-pointer block ${isCompleted ? 'line-through text-gray-500' : 'text-[--accent-navy] dark:text-white'}`}>{lecture.title}</label>
                            {lecture.summary && <p className="text-sm text-gray-600 dark:text-gray-300 mt-2 leading-relaxed">{lecture.summary}</p>}
                        </div>
                    </div>

                    {hasVideo ? <button type="button" onClick={() => onFloatLecture?.({ weekTitle, lecture })} className="lecture-launch-card">
                        <div>
                            <span className="lecture-launch-icon mx-auto mb-5"><Icon name="play" className="w-8 h-8 fill-current" /></span>
                            <strong className="block text-xl sm:text-2xl mb-2">تشغيل {lecture.title}</strong>
                            <span className="text-sm text-white/70">شاهد المحاضرة بحجم مريح، وصغّرها وقت ما تحتاج تتنقل داخل التطبيق.</span>
                        </div>
                    </button> : <div className="lecture-launch-card !cursor-default !from-slate-700 !to-slate-900">
                        <div>
                            <span className="lecture-launch-icon mx-auto mb-5"><Icon name="calendar-clock" className="w-8 h-8" /></span>
                            <strong className="block text-xl sm:text-2xl mb-2">المحاضرة هتتضاف بعد اللقاء</strong>
                            <span className="text-sm text-white/75">المكان جاهز، وأول ما التسجيل يتوفر هتلاقيه هنا مع الشرح والمرفقات.</span>
                        </div>
                    </div>}

                    <div className="lesson-separator"></div>
                    <div className="lecture-tool-panel notes-panel-highlight p-3 sm:p-4 space-y-4">
                        <div className="flex items-start justify-between gap-3 flex-wrap sm:flex-nowrap">
                            <div className="notes-panel-header min-w-0 flex-grow">
                                <span className="notes-panel-icon"><Icon name="notebook-pen" className="w-5 h-5" /></span>
                                <div className="min-w-0">
                                    <h5 className="notes-panel-title font-bold text-lg sm:text-xl flex items-center gap-2">ملاحظاتي على المحاضرة</h5>
                                    <p className="notes-panel-subtitle text-sm mt-1 leading-relaxed">اكتب، اتكلم لتحويل صوتك لنص، أو احفظ تسجيل صوتي بعنوان واضح.</p>
                                </div>
                            </div>
                            <button type="button" onClick={() => setIsToolsOpen(prev => !prev)} className="lecture-chip-button rounded-lg px-3 py-2 font-semibold inline-flex items-center gap-1 flex-shrink-0"><Icon name={isToolsOpen ? 'chevron-up' : 'chevron-down'} className="w-4 h-4" /> {isToolsOpen ? 'إخفاء' : 'إظهار'}</button>
                        </div>
                        {copyMessage && <div className="text-sm font-bold text-[--accent-green] bg-green-50 dark:bg-slate-900 border border-[--accent-green]/30 rounded-lg px-3 py-2">{copyMessage}</div>}
                        {manualCopyText && <div className="manual-copy-box space-y-2"><div className="flex items-center justify-between gap-2"><p className="text-sm font-bold text-[--accent-navy] dark:text-white">نسخ يدوي</p><button type="button" onClick={() => setManualCopyText('')} className="text-sm font-bold text-red-500">إغلاق</button></div><textarea value={manualCopyText} readOnly onFocus={e => e.target.select()} onClick={e => e.target.select()} /><p className="text-xs text-gray-600 dark:text-gray-300">اضغط مطولًا على النص ثم اختار Copy.</p></div>}
                        {isToolsOpen && <div className="space-y-4">
                            <div className="space-y-3">
                                <input value={noteTitle} onChange={e => setNoteTitle(e.target.value)} placeholder="عنوان الملاحظة" className="app-field note-title-input font-bold" />
                                <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="اكتب تفاصيل الملاحظة هنا..." className="app-field notes-textarea"></textarea>
                                <VoiceNoteTools onTranscript={appendTranscript} audioBlob={pendingAudioBlob} onAudioBlobChange={setPendingAudioBlob} />
                                <div className="flex flex-wrap gap-2">
                                    <button type="button" onClick={addNote} className="btn-brand-primary rounded-lg px-4 py-2 font-bold inline-flex items-center gap-2"><Icon name="save" className="w-4 h-4" /> حفظ الملاحظة</button>
                                    <button type="button" onClick={copyCurrentNote} className="lecture-chip-button rounded-lg px-4 py-2 font-bold inline-flex items-center gap-2"><Icon name="copy" className="w-4 h-4" /> نسخ الملاحظة</button>
                                    
                                    
                                </div>
                            </div>
                            <div className="space-y-3 max-h-[580px] overflow-auto pr-1">
                                {notes.length === 0 ? <p className="text-sm text-gray-500 dark:text-gray-400">أول ملاحظة هتظهر هنا وفي مركز الملاحظات.</p> : notes.map(note => (
                                    <div key={note.id} className="bg-white dark:bg-slate-900 rounded-lg p-3 border border-gray-200 dark:border-gray-700 space-y-3">
                                        <div className="flex items-start justify-between gap-2"><span className="text-xs text-gray-500 dark:text-gray-400">{new Date(note.createdAt).toLocaleString('ar-EG')}{note.updatedAt && note.updatedAt !== note.createdAt ? ' · تم التعديل' : ''}</span><div className="flex items-center gap-2"><button type="button" onClick={() => downloadSmarterCard({ kind: 'ملاحظة من المحاضرة', title: note.title || 'ملاحظة بدون عنوان', content: note.text || (note.audioId ? 'تسجيل صوتي محفوظ داخل التطبيق.' : ''), week: weekTitle, lecture: lecture.title, date: new Date(note.updatedAt || note.createdAt).toLocaleDateString('ar-EG') })} className="text-[--accent-green]" title="حفظ الملاحظة كصورة"><Icon name="image-down" className="w-4 h-4" /></button><button type="button" onClick={() => copySavedNote(note)} className="text-[--accent-green]" title="نسخ الملاحظة"><Icon name="copy" className="w-4 h-4" /></button><button type="button" onClick={() => deleteNote(note)} className="text-red-500" title="حذف الملاحظة"><Icon name="trash-2" className="w-4 h-4" /></button></div></div>
                                        <input value={note.title || ''} onChange={e => updateNote(note.id, { title: e.target.value })} className="app-field font-bold py-2" placeholder="عنوان الملاحظة" />
                                        <textarea value={note.text || ''} onChange={e => updateNote(note.id, { text: e.target.value })} className="app-field min-h-[100px] text-sm leading-relaxed" placeholder={note.audioId ? 'ممكن تضيف وصفًا للتسجيل الصوتي...' : 'محتوى الملاحظة'}></textarea>
                                        <AudioNotePlayer note={note} />
                                        <div className="flex flex-wrap gap-2">
                                            <button type="button" onClick={() => saveNoteChanges(note)} className="btn-brand-primary rounded-lg px-4 py-2 font-bold inline-flex items-center gap-2"><Icon name="save" className="w-4 h-4" /> حفظ التعديلات</button>
                                            <button type="button" onClick={() => copySavedNote(note)} className="share-card-button"><Icon name="copy" className="w-4 h-4" /> نسخ المحتوى</button>
                                            
                                            <button type="button" onClick={() => downloadSmarterCard(notePayload(note))} className="share-card-button"><Icon name="image-down" className="w-4 h-4" /> حفظ كصورة</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>}
                    </div>

                    <div className="lesson-separator"></div>
                    <div>
                        <p className="lesson-flow-label"><Icon name="paperclip" className="w-4 h-4 text-[--accent-green]" /> شرح ومرفقات المحاضرة</p>
                        <div className="space-y-3">
                            {attachments.length ? attachments.map((attachment, attachmentIndex) => (
                                <a key={`${attachment.url}-${attachmentIndex}`} href={attachment.url} target="_blank" rel="noopener noreferrer" className="lesson-resource-card">
                                    <span className="lesson-resource-icon"><Icon name={attachment.icon || 'book-open-text'} className="w-6 h-6" /></span>
                                    <span className="flex-grow min-w-0"><strong className="block text-lg text-[--accent-navy] dark:text-white">{attachment.title}</strong><span className="block text-sm text-gray-600 dark:text-gray-300 mt-1">{attachment.description || 'افتح الشرح العملي والمصادر الخاصة بالمحاضرة.'}</span></span>
                                    <Icon name="arrow-up-left" className="w-5 h-5 text-[--accent-green] flex-shrink-0" />
                                </a>
                            )) : <div className="lesson-resource-card"><span className="lesson-resource-icon"><Icon name="clock-3" className="w-6 h-6" /></span><span><strong className="block text-lg text-[--accent-navy] dark:text-white">المرفقات هتضاف هنا</strong><span className="block text-sm text-gray-600 dark:text-gray-300 mt-1">مكان جاهز للشرح، الملفات، اللينكات، والـ prompts الخاصة بالمحاضرة.</span></span></div>}
                        </div>
                    </div>


                    <div className="lesson-separator"></div>
                    <button type="button" onClick={() => onOpenTaskWeek?.(weekIndex, lectureId)} className="lesson-task-card">
                        <span className="lesson-task-icon"><Icon name="clipboard-check" className="w-7 h-7" /></span>
                        <span className="flex-grow"><strong className="block text-xl">يلا نطبق: تاسك {lecture.title}</strong><span className="block text-sm text-white/85 mt-1">المعلومة بتثبت بالتطبيق. افتح تاسكات الأسبوع ونفّذ المطلوب خطوة بخطوة.</span></span>
                        <Icon name="arrow-left" className="w-6 h-6 flex-shrink-0" />
                    </button>


                </li>
            );
        };

        const LECTURE_COMPLETION_KEY = 'lectureCompletionStatus:round4-completed';
        const LecturesTab = ({ setModalMessage, onOpenTaskWeek, onFloatLecture, currentWeekIndex, focusWeekIndex, onCelebrate }) => {
            const CURRENT_WEEK_INDEX = currentWeekIndex
            const DEFAULT_OPEN_WEEK_INDEX = APP_MODE === 'live' ? CURRENT_WEEK_INDEX : getRecommendedWeekIndex();
            const [openWeek, setOpenWeek] = useState(lecturesData[DEFAULT_OPEN_WEEK_INDEX]?.title || null);
            const [isAvailabilityOpen, setAvailabilityOpen] = useState(false);
            const [completedLectures, setCompletedLectures] = useState(() => {
                try {
                    const saved = localStorage.getItem(LECTURE_COMPLETION_KEY);
                    return saved ? JSON.parse(saved) : {};
                } catch (error) {
                    console.error("Failed to parse lecture completion status from localStorage", error);
                    return {};
                }
            });


            useEffect(() => {
                localStorage.setItem(LECTURE_COMPLETION_KEY, JSON.stringify(completedLectures));
                dispatchSmarterEvent('smarter-progress-updated');
            }, [completedLectures]);

            const handleToggleWeek = (title) => {
                setOpenWeek(prev => (prev === title ? null : title));
            };

            const handleToggleLecture = (lectureKey) => {
                setCompletedLectures(prev => {
                    const willComplete = !prev[lectureKey];
                    if (willComplete) onCelebrate?.('lecture');
                    return { ...prev, [lectureKey]: willComplete };
                });
            };
            useEffect(() => {
                const targetIndex = focusWeekIndex ?? (APP_MODE === 'live' ? CURRENT_WEEK_INDEX : getRecommendedWeekIndex());
                const targetWeek = lecturesData[targetIndex];
                if (!targetWeek) return;
                setOpenWeek(targetWeek.title);
                window.setTimeout(() => document.getElementById(`lecture-week-${targetIndex}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
            }, [focusWeekIndex, CURRENT_WEEK_INDEX]);
            
            let total = 0;
            let completed = 0;
            lecturesData.forEach((week, index) => {
                if (index <= CURRENT_WEEK_INDEX && week.lectures) {
                    total += week.lectures.length;
                    week.lectures.forEach(lecture => {
                        if (completedLectures[`${week.title}-${lecture.title}`]) {
                            completed++;
                        }
                    });
                }
            });
            const overallProgress = total > 0 ? (completed / total) * 100 : 0;

            const reminderText = APP_LECTURES_REMINDER;

            return (
                <div className="space-y-6">
                    <Reminder>{reminderText}</Reminder>
                    
                     <GlobalProgressBar 
                        title="إجمالي تقدم المحاضرات"
                        progress={overallProgress}
                        completedCount={completed}
                        totalCount={total}
                        icon="book-open-check"
                    />

                    <div className="content-card p-5 rounded-xl shadow-md border-r-4 border-[--accent-green]">
                        <div className="flex flex-col sm:flex-row sm:items-center gap-4">
                            <div className="p-3 rounded-full bg-green-50 dark:bg-slate-800 text-[--accent-green] w-fit">
                                <Icon name="headphones" className="w-8 h-8" />
                            </div>
                            <div className="flex-grow">
                                <h3 className="section-header text-xl font-bold mb-1">المحاضرات متاحة داخل الموقع</h3>
                                <p className="text-sm sm:text-base text-gray-700 dark:text-gray-300 leading-relaxed">
                                    شغّل المحاضرة وسجّل ملاحظاتك واحفظها، وبعدها تقدر ترجع لها وتعدّلها أو تنسخ كل ملاحظة لوحدها.
                                </p>
                            </div>
                        </div>
                    </div>

                    <LectureFeedbackBox />

                    <div className="space-y-4 mt-6">
                        {lecturesData.map((week, index) => {
                            const isLocked = index > CURRENT_WEEK_INDEX;
                            const totalLectures = week.lectures?.length || 0;
                            const completedCount = week.lectures?.filter(l => completedLectures[`${week.title}-${l.title}`]).length || 0;
                            const progress = totalLectures > 0 ? Math.round((completedCount / totalLectures) * 100) : 0;

                            return (
                                <div key={week.title} id={`lecture-week-${index}`}>
                                <Accordion
                                    key={week.title}
                                    title={week.title}
                                    isOpen={!isLocked && openWeek === week.title}
                                    onToggle={() => isLocked ? setModalMessage(APP_LOCKED_MESSAGE) : handleToggleWeek(week.title)}
                                    progress={isLocked ? 0 : progress}
                                    isLocked={isLocked}
                                >
                                    {!isLocked ? (
                                        <div className="space-y-6">
                                            {week.projectDetails ? (
                                                <div className="bg-white dark:bg-slate-800 rounded-lg">
                                                    <h4 className="subsection-title flex items-center gap-2 mb-4"><Icon name="award" /> تفاصيل مشروع التخرج</h4>
                                                    <div className="space-y-5 px-2 text-gray-700 dark:text-gray-300">
                                                        {week.projectDetails.map((section, idx) => (
                                                            <div key={idx}>
                                                                <h5 className="font-bold text-lg text-[--accent-navy] dark:text-[--accent-green] mb-2">{section.title}</h5>
                                                                <ul className="list-disc list-inside space-y-1">
                                                                    {section.items.map((item, i) => (
                                                                        <li key={i} className="leading-relaxed">{item}</li>
                                                                    ))}
                                                                </ul>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    {week.note && (
                                                        <div className="mt-5 p-4 bg-red-50 dark:bg-red-900/20 border-r-4 border-red-500 rounded-lg text-red-700 dark:text-red-400 font-semibold flex items-start gap-3 shadow-sm">
                                                            <Icon name="info" className="w-6 h-6 flex-shrink-0" />
                                                            <p className="leading-relaxed">{week.note}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="week-intro-card mb-5">
                                                        <div className="flex items-start gap-3">
                                                            <div className="p-2.5 rounded-lg bg-[--accent-navy] text-white flex-shrink-0"><Icon name={week.icon || 'sparkles'} className="w-6 h-6" /></div>
                                                            <div><h4 className="font-bold text-lg text-[--accent-navy] dark:text-white mb-1">الأسبوع ده هيساعدك في إيه؟</h4><p className="text-sm sm:text-base text-gray-700 dark:text-gray-300 leading-relaxed">{week.summary}</p></div>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <h4 className="subsection-title flex items-center gap-2"><Icon name="layers-3" /> محتوى الأسبوع</h4>
                                                        <p className="text-sm text-gray-600 dark:text-gray-300 mt-3 mb-2 leading-relaxed">كل محاضرة وحدة مستقلة: شاهدها، سجّل ملاحظاتك، افتح الشرح والمرفقات، وبعدها نفّذ التاسك.</p>
                                                        {week.lectures && week.lectures.length > 0 ? (
                                                            <ul className="space-y-6 mt-4 text-gray-800 dark:text-gray-200">
                                                                {week.lectures.map((lecture, lectureIndex) => {
                                                                    const lectureKey = `${week.title}-${lecture.title}`;
                                                                    const isCompleted = !!completedLectures[lectureKey];
                                                                    const mappedAttachments = lecture.attachments || ((week.guides || []).length === (week.lectures || []).length ? [week.guides[lectureIndex]].filter(Boolean) : (lectureIndex === 0 ? (week.guides || []) : []));
                                                                    return (
                                                                        <LecturePlayer
                                                                            key={lecture.id || lectureKey}
                                                                            weekTitle={week.title}
                                                                            weekIndex={index}
                                                                            lecture={lecture}
                                                                            index={lectureIndex}
                                                                            isCompleted={isCompleted}
                                                                            onToggleComplete={() => handleToggleLecture(lectureKey)}
                                                                            onFloatLecture={onFloatLecture}
                                                                            onCelebrate={onCelebrate}
                                                                            attachments={mappedAttachments}
                                                                            onOpenTaskWeek={onOpenTaskWeek}
                                                                        />
                                                                    );

            [

        const TASK_PRESENTATION_BY_WEEK = [
            [{ title:'ابنِ أول محادثة احترافية في مجالك', summary:'اختار استخدامًا حقيقيًا يهمك، وابنِ محادثة واضحة مع ChatGPT أو Gemini لحد ما توصل لنتيجة قابلة للاستخدام.', ideas:['حدد هدفك والسياق قبل ما تبدأ.','استخدم Prompt Mood لو محتاج مساعدة في صياغة الطلب.','كمّل النقاش وعدّل النتيجة بدل ما تكتفي بأول رد.'] }],

            ],

            [{ title:'اصنع فيديو قصير أو حرّك فكرة', summary:'حوّل فكرة بسيطة إلى مشهد أو فيديو قصير متماسك بدل الدخول في مشروع ضخم.', ideas:['حدد الستايل والشخصية والصوت.','قسّم الفكرة لمشاهد صغيرة.','راجع ثبات الشخصية والحركة قبل التجميع.'] }],
            [{ title:'أنشئ تجربة صوتية أو دبلجة', summary:'نفّذ صوتًا أو حوارًا أو دبلجة قصيرة تخدم استخدامًا حقيقيًا عندك.', ideas:['حدد النبرة واللغة والمشاعر.','اختار الأداة المناسبة للاستخدام.','راجع النطق والتشكيل والمزامنة.'] }],
            [{ title:'ابنِ مساعدًا شخصيًا لمهمة متكررة', summary:'اختار مهمة بتكرر شرحها، وابنِ مساعدًا متخصصًا يساعدك فيها.', ideas:['تأكد الأول إن المساعد مش موجود بالفعل.','حدد التعليمات والمرجع والمخرج المطلوب.','اختبره بأكثر من حالة وعدّل تعليماته.'] }],
            [{ title:'ابنِ موقعًا أو تطبيقًا بسيطًا', summary:'اختار مشكلة صغيرة وابنِ لها موقعًا أو أداة قابلة للتجربة والمشاركة.', ideas:['حدد المستخدم والوظيفة الأساسية.','ابدأ بأبسط نسخة تعمل فعلًا.','اختبرها على الموبايل وشارك الرابط.'] }],
            [{ title:'سلّم مشروع تخرجك وقصة تطورك', summary:'اجمع أقوى استخداماتك ومخرجاتك في مشروع واضح يبين الفرق اللي صنعه AI معاك.', ideas:['اختار أقوى حالتين أو ثلاث حالات استخدام.','وضح المشكلة والطريقة والنتيجة.','رتب الروابط والمخرجات واستعد للـFeedback.'] }]
        ];
        const getTaskPresentation = (weekIndex, taskIndex, taskObj) => TASK_PRESENTATION_BY_WEEK[weekIndex]?.[taskIndex] || {
            title: getTaskShortTitle(taskObj, taskIndex),
            summary: typeof taskObj === 'string' ? taskObj : (taskObj.brief || taskObj.text || ''),
            ideas: TASK_GUIDANCE_BY_WEEK[weekIndex] || []
        };
        const cleanWeekTitle = value => String(value || '').replace(/^تاسكات\s+/,'').replace(/^الأسبوع\s+(\d+)\s*:\s*/,'الأسبوع $1 — ').trim();

        const TASK_COMPLETION_KEY = 'taskCompletionStatus:round4-completed';
        const TASK_WORKSPACE_KEY = 'smartTaskWorkspaceV2:round4-completed';
        const CUSTOM_TASKS_KEY = 'smartCustomTasksV1:round4-completed';
        const PERSONAL_SPACE_URL_KEY = 'smartPersonalSpaceUrlV1:round4-completed';
        const PERSONAL_SPACE_TEMPLATE_FILE = 'smarter_with_ai_journey.html';
        const CUSTOM_TOOLS_KEY = 'smartCustomToolsV1:round4-completed';
        const CUSTOM_TOOL_CATEGORIES_KEY = 'smartToolCategoriesV1:round4-completed';
        const FAVORITE_TOOLS_KEY = 'smartFavoriteToolsV1:round4-completed';
        const FAVORITE_ASSISTANTS_KEY = 'smartFavoriteAssistantsV1:round4-completed';
        const CUSTOM_ASSISTANTS_KEY = 'smartCustomAssistantsV1:round4-completed';
        const CUSTOM_SKILLS_KEY = 'smartCustomSkillsV1:round4-completed';
        const MY_PATHS_KEY = 'smartMyPathsV1:round4-completed';
        const CUSTOM_PATHS_KEY = 'smartCustomPathsV1:round4-completed';
        const PERSONAL_NOTES_KEY = `smartPersonalNotes:${APP_STORAGE_NAMESPACE}`;

        const normalizeExternalUrl = value => {
            const clean = String(value || '').trim();
            if (!clean) return '';
            try { return new URL(/^https?:\/\//i.test(clean) ? clean : `https://${clean}`).href; } catch (error) { return ''; }
        };
        const readCustomTasks = () => safeJsonParse(localStorage.getItem(CUSTOM_TASKS_KEY), []);
        const getTasksDataWithCustom = () => tasksData;

        const getTaskStorageKey = (weekTitle, taskObj) => {
            const text = typeof taskObj === 'string' ? taskObj : taskObj.text;
            const scopedId = typeof taskObj === 'object' ? (taskObj.id || taskObj.lectureId || '') : '';
            return scopedId ? `${weekTitle}-${scopedId}-${text}` : `${weekTitle}-${text}`;
        };
        const getTaskWorkspaceId = (weekIndex, taskObj, taskIndex = 0) => {
            const scoped = typeof taskObj === 'object' ? (taskObj.id || taskObj.lectureId || '') : '';
            const title = typeof taskObj === 'string' ? taskObj : taskObj.text;
            const compact = String(title || '').replace(/\s+/g, ' ').trim().slice(0, 90);
            return `${APP_STORAGE_NAMESPACE}:w${weekIndex + 1}:${scoped || taskIndex}:${compact}`;
        };
        const getTaskShortTitle = (taskObj, index) => {
            const text = typeof taskObj === 'string' ? taskObj : taskObj.text;
            const cleaned = String(text || '').replace(/^\s*\d+[.)-]?\s*/, '').replace(/[📽️📊🎨🧭📝💡🚀]+/g, '').trim();
            return cleaned.length > 78 ? `${cleaned.slice(0, 75)}…` : (cleaned || `تاسك ${index + 1}`);
        };
        const readTaskWorkspace = () => safeJsonParse(localStorage.getItem(TASK_WORKSPACE_KEY), {});
        const writeTaskWorkspace = (records) => {
            localStorage.setItem(TASK_WORKSPACE_KEY, JSON.stringify(records));
            dispatchSmarterEvent('smarter-task-workspace-updated');
            dispatchSmarterEvent('smarter-progress-updated');
        };
        const toolIdentity = tool => tool?.id || `${tool?.category || 'عام'}|${tool?.name || ''}|${tool?.url || ''}`;
        const flattenToolsCatalog = () => {
            const found = [];
            const visit = (node, inheritedCategory = 'أدوات أخرى') => {
                if (!node) return;
                if (Array.isArray(node)) return node.forEach(item => visit(item, inheritedCategory));
                const category = node.title || inheritedCategory;
                if (Array.isArray(node.tools)) node.tools.forEach(tool => found.push({ ...tool, category, id: toolIdentity({ ...tool, category }) }));
                if (Array.isArray(node.subCategories)) node.subCategories.forEach(sub => visit(sub, `${category} / ${sub.title}`));
            };
            try { visit(toolsData); } catch (error) {}
            const custom = safeJsonParse(localStorage.getItem(CUSTOM_TOOLS_KEY), []);
            custom.forEach(tool => found.push({ ...tool, id: tool.id || toolIdentity(tool), custom: true }));
            const seen = new Set();
            return found.filter(tool => {
                const key = `${String(tool.name).toLowerCase()}|${tool.url || ''}`;
                if (seen.has(key)) return false;
                seen.add(key); return true;
            });
        };
        const addCustomToolGlobal = (tool) => {
            const list = safeJsonParse(localStorage.getItem(CUSTOM_TOOLS_KEY), []);
            const next = { ...tool, id: tool.id || `custom-tool-${Date.now()}-${Math.random().toString(16).slice(2)}`, custom: true };
            localStorage.setItem(CUSTOM_TOOLS_KEY, JSON.stringify([next, ...list].slice(0, 250)));
            dispatchSmarterEvent('smarter-tools-updated');
            return next;
        };
        const setToolFavorite = (tool, isFavorite) => {
            const current = safeJsonParse(localStorage.getItem(FAVORITE_TOOLS_KEY), []);
            const id = toolIdentity(tool);
            const next = isFavorite ? Array.from(new Set([...current, id])) : current.filter(value => value !== id);
            localStorage.setItem(FAVORITE_TOOLS_KEY, JSON.stringify(next));
            dispatchSmarterEvent('smarter-tools-updated');
            return next;
        };
        const formatTaskBody = record => {
            const steps = (record.steps || []).filter(step => step.text?.trim()).map((step, i) => `${i + 1}. ${step.text.trim()}`).join('\n');
            const resources = [
                ...(record.resources || []),
                ...(record.taskLink && !(record.resources || []).some(resource => resource.url === record.taskLink) ? [{ label:'المخرج النهائي', type:record.outputType || 'رابط', url:record.taskLink, description:'' }] : [])
            ].filter(resource => resource.url).map(resource => `• ${resource.type || 'مخرج'}: ${resource.url}`).join('\n');
            const optional = [
                steps ? `🪜 عملته إزاي؟\n${steps}` : '',
                record.difficulty ? `🎚️ الصعوبة: ${record.difficulty}` : '',
                record.weekValue ? `📚 قيمة محتوى الأسبوع: ${record.weekValue}` : '',
                record.impact ? `💡 التاسك فرق معايا إزاي؟\n${record.impact}` : '',
                record.workflowDecision ? `🔁 هستخدمه تاني؟ ${record.workflowDecision}` : ''
            ].filter(Boolean).join('\n\n');
            return `🎯 عملت إيه؟\n${record.outcome || '—'}${resources ? `\n\n🔗 المخرج النهائي:\n${resources}` : ''}${optional ? `\n\n${optional}` : ''}`;
        };
        const formatTaskRecord = record => {
            const taskName = record.taskTitle || record.title || 'تطبيق الأسبوع';
            const studentName = record.studentName || 'أحد طلاب Smarter With AI';
            return `✅ ${taskName}\n📅 ${cleanWeekTitle(record.weekTitle)}\n👤 ${studentName} — ${TASK_SHARE_BATCH_LABEL}\n\n${formatTaskBody(record)}`;
        };
        const getTaskImagePayload = (record, fallbackWeek) => ({
            headerTitle: record.studentName || 'أحد طلاب Smarter With AI',
            kind: TASK_SHARE_BATCH_LABEL,
            title: record.taskTitle || record.title || 'تطبيق الأسبوع',
            content: formatTaskBody(record),
            week: cleanWeekTitle(record.weekTitle || fallbackWeek),
            lecture: '',
            date: new Date(record.updatedAt || Date.now()).toLocaleDateString('ar-EG')
        });

        const TaskExecutionStudio = ({ item, taskObj, taskIndex, weekIndex, record, profile, personalSpaceUrl, onSave, onComplete, onReopen, forceOpen = false }) => {
            const taskId = getTaskWorkspaceId(weekIndex, taskObj, taskIndex);
            const presentation = getTaskPresentation(weekIndex, taskIndex, taskObj);
            const taskBrief = presentation.summary;
            const [isOpen, setIsOpen] = useState(forceOpen);
            const [draft, setDraft] = useState(() => record || {
                id: taskId, weekIndex, weekTitle: item.title, taskTitle: presentation.title, title: presentation.title, taskBrief,
                status: 'not-started', outcome: '', steps: [], resources: [], impact: '', difficulty: '', weekValue: '', taskLink: '', outputType: 'ملف أو رابط', workflowDecision: '', studentName: profile?.firstName || '', studentProfession: profile?.profession || '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
            });
            const [message, setMessage] = useState('');
            const [manualCopyText, setManualCopyText] = useState('');
            const [toolSearch, setToolSearch] = useState('');
            const [toolCategory, setToolCategory] = useState('all');
            const [showToolPicker, setShowToolPicker] = useState(false);
            const [resourceDraft, setResourceDraft] = useState({ label:'ملف أو رابط', type:'ملف أو رابط', url:'', description:'' });
            const [catalog, setCatalog] = useState(flattenToolsCatalog);
            const [favoriteIds, setFavoriteIds] = useState(() => safeJsonParse(localStorage.getItem(FAVORITE_TOOLS_KEY), []));
            const [newTool, setNewTool] = useState({ name: '', url: '', category: '' });
            useEffect(() => { if (record) setDraft(record); }, [record?.updatedAt, taskId]);
            useEffect(() => {
                if (!forceOpen) return;
                setIsOpen(true);
                window.setTimeout(() => document.getElementById(`task-item-${encodeURIComponent(taskId)}`)?.scrollIntoView({ behavior:'smooth', block:'center' }), 220);
            }, [forceOpen, taskId]);
            useEffect(() => {
                const refresh = () => { setCatalog(flattenToolsCatalog()); setFavoriteIds(safeJsonParse(localStorage.getItem(FAVORITE_TOOLS_KEY), [])); };
                window.addEventListener('smarter-tools-updated', refresh); return () => window.removeEventListener('smarter-tools-updated', refresh);
            }, []);
            const flash = value => { setMessage(value); window.setTimeout(() => setMessage(''), 3200); };
            const patch = values => setDraft(prev => ({ ...prev, ...values, status: prev.status === 'completed' ? 'completed' : 'in-progress' }));
            const addStep = () => patch({ steps: [...(draft.steps || []), { id: `step-${Date.now()}-${Math.random().toString(16).slice(2)}`, text: '' }] });
            const updateStep = (id, text) => patch({ steps: (draft.steps || []).map(step => step.id === id ? { ...step, text } : step) });
            const removeStep = id => patch({ steps: (draft.steps || []).filter(step => step.id !== id) });
            const moveStep = (index, direction) => {
                const next = [...(draft.steps || [])]; const target = index + direction;
                if (target < 0 || target >= next.length) return;
                [next[index], next[target]] = [next[target], next[index]]; patch({ steps: next });
            };
            const addResource = () => {
                const url = normalizeExternalUrl(resourceDraft.url);
                if (!url) return flash('اكتب رابطًا صحيحًا للمحادثة أو الملف أو المشروع.');
                const resource = { id:`resource-${Date.now()}-${Math.random().toString(16).slice(2)}`, label:resourceDraft.label.trim() || resourceDraft.type, type:resourceDraft.type, url, description:resourceDraft.description.trim() };
                patch({ resources:[...(draft.resources || []), resource] });
                setResourceDraft({ label:'ملف أو رابط', type:'ملف أو رابط', url:'', description:'' });
                flash('اتضاف الرابط للمخرج. تأكد إن صلاحية المشاهدة مفتوحة قبل المشاركة.');
            };
            const removeResource = id => patch({ resources:(draft.resources || []).filter(resource => resource.id !== id) });
            const toggleTool = tool => {
                const id = toolIdentity(tool); const exists = (draft.tools || []).some(row => toolIdentity(row) === id);
                patch({ tools: exists ? draft.tools.filter(row => toolIdentity(row) !== id) : [...(draft.tools || []), { id, name: tool.name, url: tool.url || '', category: tool.category || 'عام', custom: !!tool.custom }] });
            };
            const addNewTool = () => {
                if (!newTool.name.trim()) return flash('اكتب اسم الأداة الأول.');
                const tool = addCustomToolGlobal({ name: newTool.name.trim(), url: newTool.url.trim(), category: newTool.category.trim() || 'أدواتي الخاصة' });
                setCatalog(flattenToolsCatalog()); toggleTool(tool); setNewTool({ name: '', url: '', category: '' }); flash('اتضافت الأداة لصندوق أدواتك واختارتها للتاسك.');
            };
            const saveDraft = () => {
                const next = { ...draft, id: taskId, weekIndex, weekTitle: item.title, taskTitle:presentation.title, title:presentation.title, taskBrief, studentName:profile?.firstName || draft.studentName || '', studentProfession:profile?.profession || draft.studentProfession || '', status: draft.status === 'completed' ? 'completed' : 'in-progress', updatedAt: new Date().toISOString() };
                setDraft(next); onSave(next); flash('تم حفظ كل تفاصيل التاسك. تقدر ترجع تكمل أو تعدّل في أي وقت.');
            };
            const completeTask = () => {
                const validSteps = (draft.steps || []).filter(step => step.text?.trim());
                if (!draft.outcome?.trim()) return flash('اكتب نبذة قصيرة عن اللي عملته والمخرج اللي وصلت له.');
                const next = { ...draft, steps: validSteps, id: taskId, weekIndex, weekTitle: item.title, taskTitle:presentation.title, title:presentation.title, taskBrief, studentName:profile?.firstName || draft.studentName || '', studentProfession:profile?.profession || draft.studentProfession || '', status: 'completed', completedAt: draft.completedAt || new Date().toISOString(), updatedAt: new Date().toISOString() };
                setDraft(next); onComplete(next); flash('عاش! التاسك بقى تجربة موثقة ومكتملة فعلًا 💚');
            };
            const reopenTask = () => { const next = { ...draft, status: 'in-progress', completedAt: '', updatedAt: new Date().toISOString() }; setDraft(next); onReopen(next); flash('رجّعنا التاسك للتطوير والتعديل.'); };
            const copyTask = async () => { const value = formatTaskRecord(draft); const ok = await copyToClipboard(value); if (!ok) setManualCopyText(value); flash(ok ? 'تم نسخ تجربة التاسك كاملة.' : 'النص جاهز تحت للنسخ اليدوي.'); };
            const shareTask = async () => {
                const value = formatTaskRecord(draft);
                if (navigator.share) { try { await navigator.share({ title: draft.title || draft.taskTitle, text: value, url: draft.taskLink || undefined }); return flash('تم فتح المشاركة.'); } catch (error) { if (error?.name === 'AbortError') return; } }
                const ok = await copyToClipboard(value); if (!ok) setManualCopyText(value); flash(ok ? 'تم نسخ التاسك للمشاركة.' : 'النص جاهز للنسخ اليدوي.');
            };
            const saveImage = () => downloadSmarterCard(getTaskImagePayload({ ...draft, weekTitle:draft.weekTitle || item.title }, item.title));
            const customCategories = safeJsonParse(localStorage.getItem(CUSTOM_TOOL_CATEGORIES_KEY), []);
            const categories = ['all', ...Array.from(new Set([...catalog.map(tool => tool.category).filter(Boolean), ...customCategories]))];
            const filteredTools = catalog.filter(tool => (toolCategory === 'all' || tool.category === toolCategory) && (!toolSearch.trim() || `${tool.name} ${tool.category}`.toLowerCase().includes(toolSearch.trim().toLowerCase()))).slice(0, 120);
            const status = draft.status || 'not-started';
            const statusLabel = status === 'completed' ? 'مكتمل وموثق' : status === 'in-progress' ? 'قيد التنفيذ' : 'لسه ما بدأتش';
            return (
                <article id={`task-item-${encodeURIComponent(taskId)}`} className={`task-studio-card ${forceOpen ? 'task-jump-highlight' : ''}`}>
                    <button type="button" onClick={() => setIsOpen(prev => !prev)} className="task-studio-header" aria-expanded={isOpen}>
                        <span className={`task-week-icon ${status === 'completed' ? 'done' : ''}`}><Icon name={status === 'completed' ? 'badge-check' : 'rocket'} className="w-6 h-6" /></span>
                        <div className="flex-grow min-w-0">
                            <div className="flex flex-wrap items-center gap-2 mb-2"><span className={`task-status-badge task-status-${status}`}>{statusLabel}</span><span className="text-xs font-bold text-[--accent-green]">تاسك {taskIndex + 1}</span></div>
                            <h4 className="font-bold text-lg text-[--accent-navy] dark:text-white leading-relaxed">{presentation.title}</h4>
                            <p className="text-sm text-gray-500 dark:text-gray-300 mt-1">{status === 'completed' ? 'اضغط لمراجعة اللي سجلته أو مشاركته.' : 'اضغط وسجّل تطبيقك في أقل من دقيقة.'}</p>
                        </div>
                        <Icon name="chevron-down" className={`w-5 h-5 text-[--accent-green] transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    {isOpen && <div className="task-studio-body space-y-4">
                        <details className="task-section-card"><summary className="task-section-title cursor-pointer !mb-0"><Icon name="scroll-text" className="w-5 h-5 text-[--accent-green]" /> نبذة وأفكار تساعدك</summary><div className="pt-3"><p className="text-sm leading-relaxed text-gray-700 dark:text-gray-200">{presentation.summary}</p><h6 className="font-bold text-[--accent-navy] dark:text-white mt-4 mb-2">ممكن تبدأ كده:</h6><ul className="space-y-2">{presentation.ideas.map((idea, idx) => <li key={idx} className="flex items-start gap-2 text-sm text-gray-700 dark:text-gray-200"><span className="task-step-number !w-6 !h-6 !text-xs flex-shrink-0">{idx + 1}</span><span className="pt-0.5">{idea}</span></li>)}</ul></div></details>
                        <section className="task-section-card">
                            <h5 className="task-section-title"><Icon name="target" className="w-5 h-5 text-[--accent-green]" /> عملت إيه؟</h5>
                            <textarea className="app-field min-h-[105px]" value={draft.outcome || ''} onChange={e => patch({ outcome: e.target.value })} placeholder="نبذة بسيطة جدًا عن اللي عملته والنتيجة اللي وصلت لها..." />
                            <div className="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700 space-y-3">
                                <div><h6 className="font-bold text-[--accent-navy] dark:text-white">المخرج النهائي</h6><p className="text-xs text-gray-500 dark:text-gray-300 mt-1">ارفع شغلك على Drive أو شارك رابط المحادثة أو الملف، وحط الرابط هنا.</p></div>
                                {(draft.resources || []).length > 0 && <div className="space-y-2">{draft.resources.map(resource => <article key={resource.id || resource.url} className="task-link-card"><div className="flex items-start gap-3"><div className="flex-grow min-w-0"><span className="task-link-type">{resource.type || 'رابط'}</span><strong className="block text-[--accent-navy] dark:text-white mt-2">{resource.label || 'مخرج التاسك'}</strong>{resource.description && <p className="text-sm text-gray-500 dark:text-gray-300 mt-1">{resource.description}</p>}<a href={resource.url} target="_blank" rel="noopener noreferrer" className="text-xs font-bold text-[--accent-green] inline-flex items-center gap-1 mt-2"><Icon name="external-link" className="w-3.5 h-3.5" /> فتح الرابط</a></div><button type="button" onClick={() => removeResource(resource.id)} className="task-mini-icon-btn !text-red-500" title="حذف الرابط"><Icon name="trash-2" className="w-4 h-4" /></button></div></article>)}</div>}
                                <div className="grid sm:grid-cols-[190px_1fr] gap-2"><select className="app-field" value={resourceDraft.type} onChange={e => setResourceDraft({ ...resourceDraft, type:e.target.value, label:e.target.value })}><option>ملف أو رابط</option><option>محادثة</option><option>صور</option><option>فيديو</option><option>ملف صوتي</option><option>Notebook</option><option>مجموعة مخرجات</option></select><input className="app-field" value={resourceDraft.url} onChange={e => setResourceDraft({ ...resourceDraft, url:e.target.value })} placeholder="الصق رابط المخرج هنا" /></div>
                                <div className="flex flex-wrap items-center gap-3"><button type="button" onClick={addResource} className="lecture-chip-button rounded-lg px-3 py-2 font-bold text-sm inline-flex items-center gap-2"><Icon name="link-2" className="w-4 h-4" /> إضافة الرابط</button><span className="text-xs text-amber-700 dark:text-amber-300">تأكد إن صلاحية الرابط تسمح بالمشاهدة.</span></div>
                            </div>
                        </section>

                        <section className="task-section-card">
                            <div className="flex items-center justify-between gap-3 mb-3"><h5 className="task-section-title !mb-0"><Icon name="list-ordered" className="w-5 h-5 text-[--accent-green]" /> عملته إزاي؟ <span className="text-xs text-gray-400">اختياري</span></h5><button type="button" onClick={addStep} className="lecture-chip-button rounded-lg px-3 py-2 font-bold text-sm inline-flex items-center gap-1"><Icon name="plus" className="w-4 h-4" /> أضف خطوة</button></div>
                            <p className="text-sm text-gray-500 dark:text-gray-300 mb-3">لو حابب تشارك زملاءك الطريقة، اكتب الخطوات. ولو مش حابب سيبها فاضية.</p>
                            <div className="space-y-2">{(draft.steps || []).map((step, idx) => <div key={step.id} className="task-step-row"><span className="task-step-number">{idx + 1}</span><textarea className="app-field !p-2 min-h-[64px] text-sm" value={step.text || ''} onChange={e => updateStep(step.id, e.target.value)} placeholder={`اكتب الخطوة ${idx + 1}...`} /><div className="flex gap-1"><button type="button" className="task-mini-icon-btn" onClick={() => moveStep(idx, -1)} title="تحريك لأعلى"><Icon name="arrow-up" className="w-4 h-4" /></button><button type="button" className="task-mini-icon-btn" onClick={() => moveStep(idx, 1)} title="تحريك لأسفل"><Icon name="arrow-down" className="w-4 h-4" /></button><button type="button" className="task-mini-icon-btn !text-red-500" onClick={() => removeStep(step.id)} title="حذف"><Icon name="trash-2" className="w-4 h-4" /></button></div></div>)}</div>
                        </section>

                        {false && <section className="task-section-card">
                            <div className="flex flex-wrap items-center justify-between gap-3 mb-3"><h5 className="task-section-title !mb-0"><Icon name="wrench" className="w-5 h-5 text-[--accent-green]" /> الأدوات والمساعدون والمهارات</h5><button type="button" onClick={() => setShowToolPicker(prev => !prev)} className="lecture-chip-button rounded-lg px-3 py-2 font-bold text-sm inline-flex items-center gap-1"><Icon name="search" className="w-4 h-4" /> {showToolPicker ? 'إخفاء الصندوق' : 'اختار من صندوق الأدوات'}</button></div>
                            {(draft.tools || []).length > 0 && <div className="flex flex-wrap gap-2 mb-3">{draft.tools.map(tool => <span key={toolIdentity(tool)} className="selected-tool-chip">{tool.name}<button type="button" onClick={() => toggleTool(tool)}><Icon name="x" className="w-3.5 h-3.5" /></button></span>)}</div>}
                            {showToolPicker && <div className="space-y-3 mb-4"><div className="grid md:grid-cols-[1fr_220px] gap-2"><input className="app-field" value={toolSearch} onChange={e => setToolSearch(e.target.value)} placeholder="ابحث باسم الأداة..." /><select className="app-field" value={toolCategory} onChange={e => setToolCategory(e.target.value)}>{categories.map(cat => <option key={cat} value={cat}>{cat === 'all' ? 'كل التصنيفات' : cat}</option>)}</select></div><div className="tool-picker-grid">{filteredTools.map(tool => { const selected = (draft.tools || []).some(row => toolIdentity(row) === toolIdentity(tool)); const favorite = favoriteIds.includes(toolIdentity(tool)); return <div key={toolIdentity(tool)} className={`tool-pick-card ${selected ? 'selected' : ''}`}><button type="button" onClick={() => toggleTool(tool)} className="w-full text-right"><strong className="block text-sm text-[--accent-navy] dark:text-white">{tool.name}</strong><span className="text-xs text-gray-500 dark:text-gray-300 mt-1 block">{tool.category}</span></button><div className="flex items-center justify-between mt-2"><button type="button" onClick={() => { const next = setToolFavorite(tool, !favorite); setFavoriteIds(next); }} className={favorite ? 'text-yellow-500' : 'text-gray-400'} title="إضافة للمفضلة"><Icon name="star" className={`w-4 h-4 ${favorite ? 'fill-current' : ''}`} /></button>{tool.url && <a href={tool.url} target="_blank" rel="noopener noreferrer" className="text-[--accent-green]" title="فتح الأداة"><Icon name="external-link" className="w-4 h-4" /></a>}</div></div>})}</div><div className="border-t border-gray-200 dark:border-gray-700 pt-3"><p className="font-bold text-sm text-[--accent-navy] dark:text-white mb-2">الأداة مش موجودة؟ أضفها لصندوقك</p><div className="grid sm:grid-cols-3 gap-2"><input className="app-field !py-2" value={newTool.name} onChange={e => setNewTool({ ...newTool, name: e.target.value })} placeholder="اسم الأداة" /><input className="app-field !py-2" value={newTool.url} onChange={e => setNewTool({ ...newTool, url: e.target.value })} placeholder="الرابط — اختياري" /><input className="app-field !py-2" value={newTool.category} onChange={e => setNewTool({ ...newTool, category: e.target.value })} placeholder="التصنيف الجديد أو الموجود" /></div><button type="button" onClick={addNewTool} className="lecture-chip-button rounded-lg px-3 py-2 font-bold text-sm inline-flex items-center gap-1 mt-2"><Icon name="plus" className="w-4 h-4" /> أضف واختار الأداة</button></div></div>}
                            <textarea className="app-field min-h-[88px]" value={draft.assistantsSkills || ''} onChange={e => patch({ assistantsSkills: e.target.value })} placeholder="اكتب المساعد أو المساعدين والمهارات اللي استخدمتها: Prompting، بحث، Storytelling، تصميم، مراجعة..." />
                        </section>}

                        <section className="task-section-card">
                            <h5 className="task-section-title"><Icon name="chart-no-axes-combined" className="w-5 h-5 text-[--accent-green]" /> تقييم سريع</h5>
                            <div className="grid md:grid-cols-3 gap-3">
                                <select className="app-field" value={draft.difficulty || ''} onChange={e => patch({ difficulty: e.target.value })}><option value="">صعوبة التاسك</option><option>سهل</option><option>متوسط</option><option>صعب</option></select>
                                <select className="app-field" value={draft.weekValue || ''} onChange={e => patch({ weekValue: e.target.value })}><option value="">محتوى الأسبوع فرق معاك؟</option><option>مفيد بس مش محتاجه دلوقتي</option><option>مفيد وهستخدمه</option><option>محتاجه جدًا</option><option>من أكتر الأسابيع اللي فرقت معايا</option></select>
                                <select className="app-field" value={draft.workflowDecision || ''} onChange={e => patch({ workflowDecision: e.target.value })}><option value="">هتستخدم التجربة تاني؟</option><option>كانت تجربة ومش محتاج أكررها</option><option>ممكن أرجع لها بعدين</option><option>هستخدمها فعلًا</option><option>هضيفها داخل مسار شغلي</option></select>
                            </div>
                            <textarea className="app-field min-h-[92px] mt-3" value={draft.impact || ''} onChange={e => patch({ impact: e.target.value })} placeholder="التاسك فرقت معاك إزاي؟ — اختياري" />
                        </section>

                        {message && <p className="text-sm font-bold text-[--accent-green]">{message}</p>}
                        {manualCopyText && <div className="manual-copy-box"><div className="flex justify-between mb-2"><strong>نسخ يدوي</strong><button type="button" onClick={() => setManualCopyText('')} className="text-red-500 font-bold">إغلاق</button></div><textarea readOnly value={manualCopyText} onFocus={e => e.target.select()} onClick={e => e.target.select()} /></div>}
                        <div className="task-studio-actions">
                            <button type="button" onClick={saveDraft} className="task-draft-button"><Icon name="save" className="w-4 h-4" /> حفظ ومتابعة لاحقًا</button>
                            {status !== 'completed' ? <button type="button" onClick={completeTask} className="task-complete-button"><Icon name="badge-check" className="w-4 h-4" /> اعتمد التاسك كمكتمل</button> : <button type="button" onClick={reopenTask} className="lecture-chip-button rounded-lg px-4 py-2 font-bold inline-flex items-center gap-2"><Icon name="pencil" className="w-4 h-4" /> رجّعه للتطوير</button>}
                            <button type="button" onClick={copyTask} className="share-card-button"><Icon name="copy" className="w-4 h-4" /> نسخ التجربة</button><button type="button" onClick={shareTask} className="share-card-button"><Icon name="share-2" className="w-4 h-4" /> مشاركة</button><button type="button" onClick={saveImage} className="share-card-button"><Icon name="image-down" className="w-4 h-4" /> حفظ كصورة</button>
                            {personalSpaceUrl && <a href={personalSpaceUrl} target="_blank" rel="noopener noreferrer" className="share-card-button"><Icon name="external-link" className="w-4 h-4" /> أضفها لمساحتي</a>}
                        </div>
                    </div>}
                </article>
            );
        };

        const CUSTOM_ENTRY_STATUS = {
            planned: { label:'لسه هعملها', className:'task-status-not-started' },
            'in-progress': { label:'قيد التنفيذ', className:'task-status-in-progress' },
            completed: { label:'نفذتها', className:'task-status-completed' }
        };
        const formatCustomEntry = (entry, profile) => {
            const parts = [`${entry.status === 'completed' ? '✅' : entry.status === 'in-progress' ? '🟡' : '💭'} ${entry.kind || 'تجربة'}: ${entry.title}`];
            if (entry.weekTitle) parts.push(`📅 ${cleanWeekTitle(entry.weekTitle)}`);
            if (profile?.firstName) parts.push(`👤 ${profile.firstName}${profile.profession ? ` — ${profile.profession}` : ''}`);
            if (entry.brief) parts.push(`📝 ${entry.brief}`);
            if (entry.steps) parts.push(`🪜 الخطوات:\n${entry.steps}`);
            if (entry.link) parts.push(`🔗 ${entry.link}`);
            if (entry.impact) parts.push(`💡 ${entry.impact}`);
            return parts.join('\n\n');
        };
        const CustomEntryCard = ({ entry, profile, onUpdate, onDelete }) => {
            const [isOpen, setIsOpen] = useState(false);
            const meta = CUSTOM_ENTRY_STATUS[entry.status] || CUSTOM_ENTRY_STATUS.planned;
            return <article className="task-studio-card">
                <button type="button" onClick={() => setIsOpen(value => !value)} className="task-studio-header" aria-expanded={isOpen}>
                    <span className="task-week-icon"><Icon name={entry.kind === 'فكرة' ? 'lightbulb' : entry.kind === 'تحدي' ? 'trophy' : entry.kind === 'تاسك شخصي' ? 'list-checks' : 'sparkles'} className="w-6 h-6" /></span>
                    <div className="flex-grow min-w-0"><div className="flex flex-wrap gap-2 mb-2"><span className="task-link-type">{entry.kind || 'تجربة'}</span><span className={`task-status-badge ${meta.className}`}>{meta.label}</span></div><h4 className="font-bold text-lg text-[--accent-navy] dark:text-white">{entry.title}</h4>{entry.brief && <p className="text-sm text-gray-500 dark:text-gray-300 mt-1 line-clamp-2">{entry.brief}</p>}</div>
                    <Icon name="chevron-down" className={`w-5 h-5 text-[--accent-green] transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                </button>
                {isOpen && <div className="task-studio-body space-y-3">
                    <div className="grid sm:grid-cols-2 gap-2"><label><span className="block text-xs font-bold text-gray-500 mb-1">الحالة</span><select className="app-field" value={entry.status || 'planned'} onChange={e => onUpdate(entry.id,{status:e.target.value,updatedAt:new Date().toISOString()})}><option value="planned">لسه هعملها</option><option value="in-progress">قيد التنفيذ</option><option value="completed">نفذتها</option></select></label>{entry.weekTitle && <div><span className="block text-xs font-bold text-gray-500 mb-1">مرتبطة بـ</span><div className="app-field">{cleanWeekTitle(entry.weekTitle)}</div></div>}</div>
                    {entry.steps && <div className="task-section-card"><strong className="text-sm text-[--accent-navy] dark:text-white">الخطوات</strong><p className="text-sm whitespace-pre-wrap mt-2">{entry.steps}</p></div>}
                    {entry.impact && <div className="task-section-card"><strong className="text-sm text-[--accent-navy] dark:text-white">النتيجة أو الأثر</strong><p className="text-sm whitespace-pre-wrap mt-2">{entry.impact}</p></div>}
                    <div className="flex flex-wrap gap-2">{entry.link && <a href={entry.link} target="_blank" rel="noopener noreferrer" className="share-card-button"><Icon name="external-link" className="w-4 h-4" /> فتح الرابط</a>}<button type="button" onClick={() => copyToClipboard(formatCustomEntry(entry, profile))} className="share-card-button"><Icon name="copy" className="w-4 h-4" /> نسخ</button><button type="button" onClick={() => onDelete(entry.id)} className="share-card-button !text-red-500"><Icon name="trash-2" className="w-4 h-4" /> حذف</button></div>
                </div>}
            </article>;
        };

        const TaskCard = ({ item, records, profile, personalSpaceUrl, onSaveRecord, onCompleteRecord, onReopenRecord, weekIndex, isOpen, onToggle, focusTaskId, customEntries = [], onUpdateCustom, onDeleteCustom }) => {
            const totalTasks = item.tasks.length;
            const completedCount = item.tasks.filter((task, idx) => records[getTaskWorkspaceId(weekIndex, task, idx)]?.status === 'completed').length;
            const inProgressCount = item.tasks.filter((task, idx) => ['in-progress','draft'].includes(records[getTaskWorkspaceId(weekIndex, task, idx)]?.status)).length;
            const progress = totalTasks > 0 ? (completedCount / totalTasks) * 100 : 0;
            return (
                <div className="content-card rounded-xl shadow-md overflow-hidden transition-all" style={progress === 100 ? { borderTopColor: 'var(--accent-green)' } : {}}>
                    <button type="button" onClick={onToggle} aria-expanded={isOpen} className="task-week-toggle w-full p-5 sm:p-6 text-right">
                        <div className="flex items-center gap-4"><span className={`task-week-icon ${progress === 100 ? 'done' : ''}`}><Icon name={progress === 100 ? 'badge-check' : 'clipboard-list'} className="w-6 h-6" /></span><div className="flex-grow min-w-0"><h3 className="text-xl sm:text-2xl font-bold text-[--accent-navy] dark:text-white">{item.title}</h3><p className="text-sm text-gray-500 dark:text-gray-300 mt-1">{completedCount} مكتمل · {inProgressCount} قيد التنفيذ · {totalTasks} تجربة عملية</p></div><Icon name="chevron-down" className={`w-6 h-6 text-[--accent-green] transition-transform ${isOpen ? 'rotate-180' : ''}`} /></div>
                        <div className="w-full bg-gray-200 rounded-full h-2 dark:bg-gray-700 mt-4"><div className="bg-[--accent-green] h-2 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div></div>
                    </button>
                    {isOpen && <div className="p-5 sm:p-6 pt-0 space-y-5 task-week-body">
                        <div className="space-y-3">{item.tasks.map((task, idx) => { const taskId=getTaskWorkspaceId(weekIndex, task, idx); return <TaskExecutionStudio key={taskId} item={item} taskObj={task} taskIndex={idx} weekIndex={weekIndex} record={records[taskId]} profile={profile} personalSpaceUrl={personalSpaceUrl} onSave={onSaveRecord} onComplete={onCompleteRecord} onReopen={onReopenRecord} forceOpen={focusTaskId===taskId} />; })}</div>
                        {customEntries.length > 0 && <section className="space-y-3 pt-4 border-t border-gray-200 dark:border-gray-700"><div><h4 className="font-bold text-lg text-[--accent-navy] dark:text-white">إضافاتي الخاصة في الأسبوع</h4><p className="text-sm text-gray-500 dark:text-gray-300">كل تجربة أو تحدي ربطته بالأسبوع ده.</p></div>{customEntries.slice().reverse().map(entry => <CustomEntryCard key={entry.id} entry={entry} profile={profile} onUpdate={onUpdateCustom} onDelete={onDeleteCustom} />)}</section>}
                        {item.note && <div className="task-note-card notice-surface p-4 border-r-4 border-yellow-500 rounded-lg font-semibold flex items-start gap-3 shadow-sm"><Icon name="lightbulb" className="w-6 h-6 flex-shrink-0" /><p className="leading-relaxed">{item.note}</p></div>}
                    </div>}
                </div>
            );
        };

        const TasksTab = ({ focusWeekIndex, focusTaskId, currentWeekIndex, profile, onCelebrate }) => {
            const [openWeekIndex, setOpenWeekIndex] = useState(null);
            const [records, setRecords] = useState(readTaskWorkspace);
            const [customTasks, setCustomTasks] = useState(readCustomTasks);
            const [showCustomCreator, setShowCustomCreator] = useState(false);
            const [customDraft, setCustomDraft] = useState({ linkedWeek:String(Math.min(currentWeekIndex || 0, COURSE_WEEK_COUNT - 1)), kind:'تجربة', status:'planned', title:'', brief:'', steps:'', link:'', impact:'', fields:['brief'] });
            const [personalSpaceUrl, setPersonalSpaceUrl] = useState(() => normalizeExternalUrl(localStorage.getItem(PERSONAL_SPACE_URL_KEY)));
            const taskWeeks = useMemo(() => getTasksDataWithCustom(), []);
            const customEntries = customTasks.map(entry => ({ kind:'تجربة', status:'planned', fields:['brief'], ...entry, linkedWeek:entry.linkedWeek ?? (entry.weekIndex !== undefined ? String(entry.weekIndex) : 'none'), weekTitle:entry.weekTitle || (entry.weekIndex !== undefined ? tasksData[Number(entry.weekIndex)]?.title : '') }));
            useEffect(() => { const refreshSpace = event => setPersonalSpaceUrl(normalizeExternalUrl(event.detail?.url || localStorage.getItem(PERSONAL_SPACE_URL_KEY))); window.addEventListener('smarter-personal-space-updated', refreshSpace); return () => window.removeEventListener('smarter-personal-space-updated', refreshSpace); }, []);
            useEffect(() => {
                const completion = {};
                taskWeeks.forEach((week, weekIndex) => (week.tasks || []).forEach((task, idx) => { completion[getTaskStorageKey(week.title, task)] = records[getTaskWorkspaceId(weekIndex, task, idx)]?.status === 'completed'; }));
                localStorage.setItem(TASK_COMPLETION_KEY, JSON.stringify(completion)); writeTaskWorkspace(records);
            }, [records, taskWeeks]);
            useEffect(() => { if (focusWeekIndex === null || focusWeekIndex === undefined) return; setOpenWeekIndex(focusWeekIndex); window.setTimeout(() => document.getElementById(`task-week-${focusWeekIndex}`)?.scrollIntoView({ behavior:'smooth', block:'start' }), 160); }, [focusWeekIndex, focusTaskId]);
            const saveRecord = record => setRecords(prev => ({ ...prev, [record.id]: record }));
            const completeRecord = record => setRecords(prev => { const wasComplete = prev[record.id]?.status === 'completed'; if (!wasComplete) onCelebrate?.('task'); return { ...prev, [record.id]: record }; });
            const reopenRecord = record => setRecords(prev => ({ ...prev, [record.id]: record }));
            const addCustomTask = () => {
                const title = customDraft.title.trim();
                if (!title) return;
                const normalizedLink = customDraft.fields.includes('link') && customDraft.link.trim() ? normalizeExternalUrl(customDraft.link) : '';
                if (customDraft.fields.includes('link') && customDraft.link.trim() && !normalizedLink) return;
                const linkedWeek = customDraft.linkedWeek;
                const nextTask = { id:`personal-${Date.now()}-${Math.random().toString(16).slice(2)}`, customEntry:true, kind:customDraft.kind, status:customDraft.status, title, linkedWeek, weekTitle:linkedWeek === 'none' ? '' : tasksData[Number(linkedWeek)]?.title || '', brief:customDraft.fields.includes('brief') ? customDraft.brief.trim() : '', steps:customDraft.fields.includes('steps') ? customDraft.steps.trim() : '', link:normalizedLink, impact:customDraft.fields.includes('impact') ? customDraft.impact.trim() : '', fields:customDraft.fields, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
                const next = [...customTasks, nextTask];
                localStorage.setItem(CUSTOM_TASKS_KEY, JSON.stringify(next));
                setCustomTasks(next); setCustomDraft({ linkedWeek, kind:'تجربة', status:'planned', title:'', brief:'', steps:'', link:'', impact:'', fields:['brief'] }); setShowCustomCreator(false);
                if (linkedWeek !== 'none') setOpenWeekIndex(Number(linkedWeek));
                dispatchSmarterEvent('smarter-custom-tasks-updated');
                dispatchSmarterEvent('smarter-progress-updated');
            };

        const cleanAssistantName = value => String(value || '').replace(/[:：]+$/,'').replace(/^(لصياغة|لتنفيذ|لبناء|للتعلم|للتلخيص|لإنشاء)\s*/,'').trim();
        const getDiplomaAssistants = () => {
