        };

        const CompletedTasksLibrary = ({ records, onRecordsChange }) => {
            const [editingId, setEditingId] = useState('');
            const [draft, setDraft] = useState(null);
            const [message, setMessage] = useState('');
            const [manualCopyText, setManualCopyText] = useState('');
            const allText = () => `تاسكاتي المكتملة — Smarter With AI\nإجمالي التاسكات: ${records.length}\n\n${records.map((record,index)=>`${index+1}) ${formatTaskRecord(record)}`).join('\n\n================================\n\n')}`;
            const flash = value => { setMessage(value); window.setTimeout(()=>setMessage(''),2800); };
            const copyAll = async () => { const value=allText(); const ok=await copyToClipboard(value); if(!ok)setManualCopyText(value); flash(ok?'تم نسخ كل التاسكات مرة واحدة.':'النص جاهز للنسخ اليدوي تحت.'); };
            const downloadAll = () => { if(!records.length)return; const blob=new Blob([allText()],{type:'text/plain;charset=utf-8'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='smarter-with-ai-all-tasks.txt'; document.body.appendChild(a); a.click(); a.remove(); window.setTimeout(()=>URL.revokeObjectURL(url),1200); flash('تم تحميل ملف كل التاسكات.'); };
            const startEdit = record => { setEditingId(record._workspaceKey); setDraft({...record}); };
            const saveEdit = () => { if(!draft)return; const current=readTaskWorkspace(); const {_workspaceKey,...payload}=draft; const resources=(payload.resources||[]).map((resource,index)=>index===0&&payload.taskLink?{...resource,url:payload.taskLink}:resource); current[editingId]={...current[editingId],...payload,resources,taskTitle:payload.taskTitle||payload.title,updatedAt:new Date().toISOString()}; writeTaskWorkspace(current); onRecordsChange?.(current); setEditingId(''); setDraft(null); flash('تم حفظ تعديلات التاسك.'); };
            if(!records.length) return <div className="notes-empty-state p-6 text-center mt-4">أول تاسك تعتمده كمكتمل هيظهر هنا.</div>;
            return <section className="space-section space-y-4">
                <div className="flex flex-col sm:flex-row sm:items-center gap-2"><div className="flex-grow"><h3 className="font-bold text-lg text-[--accent-navy] dark:text-white">أرشيف التاسكات</h3><p className="text-sm text-gray-500">عدّل أي تاسك، احفظه كصورة، أو خُد الأرشيف كله لموقعك أو بورتفوليو.</p></div><button type="button" onClick={copyAll} className="share-card-button"><Icon name="copy" className="w-4 h-4" /> نسخ الكل</button><button type="button" onClick={downloadAll} className="share-card-button"><Icon name="download" className="w-4 h-4" /> تحميل ملف نصي</button></div>
                {message&&<p className="text-sm font-bold text-[--accent-green]">{message}</p>}
                {manualCopyText&&<div className="manual-copy-box"><div className="flex justify-between mb-2"><strong>كل التاسكات جاهزة للنسخ</strong><button onClick={()=>setManualCopyText('')} className="text-red-500 font-bold">إغلاق</button></div><textarea readOnly value={manualCopyText} onFocus={e=>e.target.select()} onClick={e=>e.target.select()} /></div>}
                <div className="grid lg:grid-cols-2 gap-3">{records.map(record=>{ const outputUrl=record.taskLink||(record.resources||[])[0]?.url; const isEditing=editingId===record._workspaceKey; return <article key={record._workspaceKey} className="task-portfolio-card space-y-3"><span className="text-xs font-bold text-[--accent-green]">{cleanWeekTitle(record.weekTitle)}</span>{isEditing?<><input className="app-field font-bold" value={draft.taskTitle||draft.title||''} onChange={e=>setDraft({...draft,taskTitle:e.target.value,title:e.target.value})} placeholder="عنوان التاسك" /><textarea className="app-field min-h-[90px]" value={draft.outcome||''} onChange={e=>setDraft({...draft,outcome:e.target.value})} placeholder="عملت إيه؟" /><textarea className="app-field min-h-[90px]" value={draft.impact||''} onChange={e=>setDraft({...draft,impact:e.target.value})} placeholder="التاسك فرق معاك إزاي؟" /><input dir="ltr" className="app-field text-left" value={draft.taskLink||''} onChange={e=>setDraft({...draft,taskLink:e.target.value})} placeholder="رابط المخرج" /><div className="flex flex-wrap gap-2"><button type="button" onClick={saveEdit} className="btn-brand-primary rounded-lg px-4 py-2 font-bold"><Icon name="save" className="w-4 h-4 inline ml-1" /> حفظ</button><button type="button" onClick={()=>{setEditingId('');setDraft(null)}} className="share-card-button">إلغاء</button></div></>:<><h4 className="font-bold text-lg text-[--accent-navy] dark:text-white">{record.taskTitle||record.title}</h4><p className="text-sm text-gray-600 dark:text-gray-300 line-clamp-3">{record.impact||record.outcome}</p><div className="flex flex-wrap gap-2">{outputUrl&&<a href={outputUrl} target="_blank" rel="noopener noreferrer" className="lecture-chip-button rounded-lg px-3 py-2 font-bold text-sm inline-flex items-center gap-2"><Icon name="external-link" className="w-4 h-4" /> فتح المخرج</a>}<button type="button" onClick={()=>startEdit(record)} className="share-card-button"><Icon name="pencil" className="w-4 h-4" /> تعديل</button><button type="button" onClick={()=>copyToClipboard(formatTaskRecord(record))} className="share-card-button"><Icon name="copy" className="w-4 h-4" /> نسخ</button><button type="button" onClick={()=>downloadSmarterCard(getTaskImagePayload(record))} className="share-card-button"><Icon name="image-down" className="w-4 h-4" /> حفظ كصورة</button></div></>}</article>})}</div>
            </section>;
        };

        const MyTasksJourney = ({ profile, taskRecords, onOpenTask }) => {
            const [activeFilter, setActiveFilter] = useState('completed');
            const [customEntries, setCustomEntries] = useState(readCustomTasks);
            useEffect(() => {
                const refresh = () => setCustomEntries(readCustomTasks());
                window.addEventListener('smarter-custom-tasks-updated', refresh);
                return () => window.removeEventListener('smarter-custom-tasks-updated', refresh);
            }, []);
            const courseTasks = tasksData.flatMap((week, weekIndex) => (week.tasks || []).map((task, taskIndex) => {
                const taskId = getTaskWorkspaceId(weekIndex, task, taskIndex);
                const record = taskRecords[taskId] || {};
                return { taskId, weekIndex, taskIndex, weekTitle:week.title, title:getTaskPresentation(weekIndex, taskIndex, task).title, status:record.status || 'not-started', updatedAt:record.updatedAt };
            }));
            const normalizedStatus = value => value === 'completed' ? 'completed' : ['in-progress','draft'].includes(value) ? 'in-progress' : 'not-started';
            const filtered = courseTasks.filter(task => normalizedStatus(task.status) === activeFilter);
            const counts = {
                completed:courseTasks.filter(task=>normalizedStatus(task.status)==='completed').length,
                'in-progress':courseTasks.filter(task=>normalizedStatus(task.status)==='in-progress').length,
                'not-started':courseTasks.filter(task=>normalizedStatus(task.status)==='not-started').length,
                custom:customEntries.length
            };
            const filters = [
                {id:'completed',label:'مكتمل'}, {id:'in-progress',label:'قيد التنفيذ'},
                {id:'not-started',label:'لسه معملتهاش'}, {id:'custom',label:'إضافاتي الخاصة'}
            ];
            const updateCustom = (id, patch) => {
                const next=customEntries.map(entry=>entry.id===id?{...entry,...patch}:entry);
                localStorage.setItem(CUSTOM_TASKS_KEY,JSON.stringify(next)); setCustomEntries(next); dispatchSmarterEvent('smarter-custom-tasks-updated');
            };
            const deleteCustom = id => {
                if(!confirm('تحذف الإضافة دي؟')) return;
                const next=customEntries.filter(entry=>entry.id!==id);
                localStorage.setItem(CUSTOM_TASKS_KEY,JSON.stringify(next)); setCustomEntries(next); dispatchSmarterEvent('smarter-custom-tasks-updated');
            };
            return <section className="space-section space-y-4">
                <div><h3 className="font-bold text-lg text-[--accent-navy] dark:text-white">رحلة تاسكاتك</h3><p className="text-sm text-gray-500 dark:text-gray-300 mt-1">كل تاسك بيتنقل تلقائيًا حسب آخر حالة حفظتها.</p></div>
                <div className="my-tasks-tabs" role="tablist">{filters.map(filter=><button type="button" key={filter.id} onClick={()=>setActiveFilter(filter.id)} className={`my-tasks-tab ${activeFilter===filter.id?'active':''}`}>{filter.label} <span className="opacity-75">({counts[filter.id]})</span></button>)}</div>
                {activeFilter==='custom' ? (customEntries.length ? <div className="space-y-3">{customEntries.slice().reverse().map(entry=><CustomEntryCard key={entry.id} entry={{kind:'تجربة',status:'planned',...entry,weekTitle:entry.weekTitle||(entry.linkedWeek!=='none'?tasksData[Number(entry.linkedWeek)]?.title:'')}} profile={profile} onUpdate={updateCustom} onDelete={deleteCustom} />)}</div> : <div className="notes-empty-state p-6 text-center"><h4 className="font-bold text-[--accent-navy] dark:text-white">لسه مفيش إضافات خاصة</h4><p className="text-sm text-gray-500 mt-1">أضف تجربة أو تحدي من تاب التاسكات، وهتظهر هنا فورًا.</p></div>) : (filtered.length ? <div className="grid lg:grid-cols-2 gap-3">{filtered.map(task=><button type="button" key={task.taskId} onClick={()=>onOpenTask(task.weekIndex,task.taskId)} className="journey-task-link"><div className="flex items-start gap-3"><span className={`task-status-badge task-status-${normalizedStatus(task.status)}`}>{activeFilter==='completed'?'مكتمل':activeFilter==='in-progress'?'قيد التنفيذ':'ابدأ الآن'}</span><div className="flex-grow min-w-0"><strong className="block text-[--accent-navy] dark:text-white">{task.title}</strong><span className="block text-xs text-[--accent-green] font-bold mt-2">{cleanWeekTitle(task.weekTitle)} · اضغط للذهاب للتاسك</span></div><Icon name="arrow-up-left" className="w-5 h-5 text-[--accent-green] flex-shrink-0" /></div></button>)}</div> : <div className="notes-empty-state p-6 text-center"><p className="font-bold text-[--accent-navy] dark:text-white">مفيش تاسكات في الحالة دي حاليًا.</p></div>)}
            </section>;
        };

        const PersonalSpaceLinkCard = () => {
            const [savedUrl, setSavedUrl] = useState(() => normalizeExternalUrl(localStorage.getItem(PERSONAL_SPACE_URL_KEY)));
            const [draftUrl, setDraftUrl] = useState(savedUrl || '');
            const [isEditing, setIsEditing] = useState(!savedUrl);
            const [message, setMessage] = useState('');
            const save = () => {
                const normalized = normalizeExternalUrl(draftUrl);
                if (!normalized) { setMessage('اكتب رابطًا صحيحًا لمساحتك الشخصية.'); return; }
                localStorage.setItem(PERSONAL_SPACE_URL_KEY, normalized);
                setSavedUrl(normalized); setDraftUrl(normalized); setIsEditing(false); setMessage('تم حفظ مساحتك. هتلاقي زر الوصول لها هنا ومع التاسكات.');
                dispatchSmarterEvent('smarter-personal-space-updated', { url:normalized });
            };
            const remove = () => {
                localStorage.removeItem(PERSONAL_SPACE_URL_KEY); setSavedUrl(''); setDraftUrl(''); setIsEditing(true); setMessage('اتشال الرابط من التطبيق فقط؛ مساحتك نفسها لسه موجودة.');
                dispatchSmarterEvent('smarter-personal-space-updated', { url:'' });
            };
            return <section className="personal-space-card space-y-4">
                <div className="flex flex-col lg:flex-row lg:items-center gap-4"><div className="personal-space-icon"><Icon name="panel-top-open" className="w-7 h-7" /></div><div className="flex-grow"><p className="text-xs font-bold text-[--accent-green] mb-1">مشروعك اللي بيكبر معاك</p><h3 className="text-xl font-bold text-[--accent-navy] dark:text-white">مساحتي الشخصية مع الـ AI</h3><p className="text-sm text-gray-600 dark:text-gray-300 mt-1">احفظ رابط موقعك أو Dashboard بتاعتك مرة واحدة، وارجع لها من التطبيق في أي وقت.</p></div>{savedUrl && <a href={savedUrl} target="_blank" rel="noopener noreferrer" className="task-complete-button justify-center"><Icon name="external-link" className="w-4 h-4" /> الذهاب إلى مساحتي</a>}</div>
                {savedUrl && !isEditing ? <div className="space-link-preview"><Icon name="link-2" className="w-4 h-4 text-[--accent-green] flex-shrink-0" /><span dir="ltr" className="truncate text-sm flex-grow text-left">{savedUrl}</span><button type="button" onClick={() => setIsEditing(true)} className="share-card-button"><Icon name="pencil" className="w-4 h-4" /> تعديل</button><button type="button" onClick={remove} className="task-mini-icon-btn !text-red-500" title="إزالة الرابط"><Icon name="trash-2" className="w-4 h-4" /></button></div> : <div className="space-y-3"><div className="flex flex-col sm:flex-row gap-2"><input dir="ltr" className="app-field flex-grow text-left" value={draftUrl} onChange={e => setDraftUrl(e.target.value)} placeholder="https://رابط-مساحتك.com" /><button type="button" onClick={save} className="btn-brand-primary px-5 py-2.5 rounded-lg font-bold inline-flex items-center justify-center gap-2"><Icon name="save" className="w-4 h-4" /> حفظ الرابط</button>{savedUrl && <button type="button" onClick={() => { setDraftUrl(savedUrl); setIsEditing(false); }} className="lecture-chip-button px-4 py-2.5 rounded-lg font-bold">إلغاء</button>}</div><p className="text-xs text-gray-500 dark:text-gray-300">لسه ما عملتش مساحتك؟ افتح التمبليت، خصّصه في أي شات، وبعد ما تنشره ارجع حط الرابط هنا.</p></div>}
                <div className="flex flex-wrap gap-2"><a href={PERSONAL_SPACE_TEMPLATE_FILE} target="_blank" className="share-card-button"><Icon name="layout-template" className="w-4 h-4" /> افتح تمبليت مساحتي</a>{savedUrl && <button type="button" onClick={() => copyToClipboard(savedUrl)} className="share-card-button"><Icon name="copy" className="w-4 h-4" /> نسخ الرابط</button>}</div>
                {message && <p className="text-sm font-bold text-[--accent-green]">{message}</p>}
            </section>;
        };

        const SpaceAccordion = ({ icon, title, subtitle, count, children, defaultOpen = false }) => <details className="space-accordion" open={defaultOpen}>
            <summary><span className="space-accordion-icon"><Icon name={icon} className="w-5 h-5" /></span><span className="flex-grow min-w-0"><strong>{title}</strong>{subtitle && <small>{subtitle}</small>}</span>{count !== undefined && <span className="task-link-type">{count}</span>}<Icon name="chevron-down" className="space-accordion-chevron w-5 h-5" /></summary>
            <div className="space-accordion-body">{children}</div>
        </details>;

        const MySpace = ({ profile, onCelebrate, onEditProfile, onOpenTask }) => {
            const [progress, setProgress] = useState(() => getProgressSnapshot(COURSE_WEEK_COUNT - 1));
            const [taskRecords, setTaskRecords] = useState(readTaskWorkspace);
            const [notesCount, setNotesCount] = useState(() => collectAllNotes().length);
            const [goalUpdates, setGoalUpdates] = useState(() => safeJsonParse(localStorage.getItem(GOAL_CHECKINS_KEY), []).length);
            useEffect(() => {
                const refresh = () => { setProgress(getProgressSnapshot(COURSE_WEEK_COUNT - 1)); setTaskRecords(readTaskWorkspace()); setNotesCount(collectAllNotes().length); setGoalUpdates(safeJsonParse(localStorage.getItem(GOAL_CHECKINS_KEY), []).length); };
                ['smarter-progress-updated','smarter-task-workspace-updated','smarter-notes-updated','smarter-goals-updated'].forEach(name => window.addEventListener(name, refresh));
                return () => ['smarter-progress-updated','smarter-task-workspace-updated','smarter-notes-updated','smarter-goals-updated'].forEach(name => window.removeEventListener(name, refresh));
            }, []);
            const completedTasks = Object.entries(taskRecords).filter(([,record]) => record.status === 'completed').map(([key,record])=>({...record,_workspaceKey:key})).sort((a,b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
            const totalItems = progress.lectureTotal + progress.taskTotal;
            const doneItems = progress.lectureDone + progress.taskDone;
            const percent = totalItems ? Math.round(doneItems / totalItems * 100) : 0;
            const journey = progress.lectureDone === 0 ? 'لسه في بداية الرحلة. أول محاضرة وأول تاسك موثق هيبدأوا يبنوا مكتبتك الشخصية.' : percent < 40 ? 'بدأت تبني أساس قوي، والأهم دلوقتي إنك توثق التطبيقات مش بس تسمع المحتوى.' : percent < 80 ? 'رحلتك بقت واضحة: عندك معرفة، تطبيقات وملاحظات. ركّز على تحويل أفضل التجارب لـ Workflows.' : 'وصلت لمرحلة قوية جدًا. راجع أفضل التاسكات، طوّرها، واستخدمها كعينات شغل وأنظمة متكررة.';
            return <div className="space-y-6">
                <section className="learning-os-hero"><div className="relative z-10 flex flex-col lg:flex-row lg:items-center gap-5"><div className="profile-avatar !w-16 !h-16 !bg-[--accent-green] !text-[--accent-navy] text-2xl">{profile.firstName.charAt(0)}</div><div className="flex-grow"><p className="text-sm font-bold text-[--accent-green] mb-1">مساحتي في Smarter With AI</p><h2 className="text-3xl sm:text-4xl font-bold">{profile.firstName}</h2><p className="text-white/80 mt-1">{profile.profession || 'رحلة تعلم وتطبيق شخصية'}</p></div><button type="button" onClick={onEditProfile} className="bg-white/12 border border-white/20 text-white rounded-xl px-4 py-3 font-bold inline-flex items-center justify-center gap-2"><Icon name="user-cog" className="w-5 h-5" /> تعديل بياناتي</button></div></section>
                <section className="space-stats-strip"><div className="learning-stat-card"><span className="learning-stat-number">{progress.lectureDone}</span><p className="text-sm font-bold mt-2">محاضرة</p><span className="text-xs text-gray-500 dark:text-gray-300">من {progress.lectureTotal}</span></div><div className="learning-stat-card"><span className="learning-stat-number">{progress.taskDone}</span><p className="text-sm font-bold mt-2">تاسك</p><span className="text-xs text-gray-500 dark:text-gray-300">من {progress.taskTotal}</span></div><div className="learning-stat-card"><span className="learning-stat-number">{percent}%</span><p className="text-sm font-bold mt-2">تطوري</p><span className="text-xs text-gray-500 dark:text-gray-300">الرحلة</span></div><div className="learning-stat-card"><span className="learning-stat-number">{notesCount}</span><p className="text-sm font-bold mt-2">ملاحظة</p><span className="text-xs text-gray-500 dark:text-gray-300">محفوظة</span></div><div className="learning-stat-card"><span className="learning-stat-number">{goalUpdates}</span><p className="text-sm font-bold mt-2">تحديث</p><span className="text-xs text-gray-500 dark:text-gray-300">على هدفي</span></div></section>
                <section className="space-section"><div className="journey-summary-box"><p className="text-sm font-bold text-[--accent-green] mb-1">نبذة عن رحلتك</p><h3 className="space-section-heading mb-2"><Icon name="route" className="w-5 h-5 text-[--accent-green]" /> أنت وصلت لفين؟</h3><p className="leading-relaxed text-gray-700 dark:text-gray-200">{journey}</p></div></section>
                <SpaceAccordion icon="panel-top-open" title="رابط مساحتي الشخصية" subtitle="احفظ أو افتح رابط موقعك الشخصي"><PersonalSpaceLinkCard /></SpaceAccordion>
                <SpaceAccordion icon="target" title="أهدافي وتطوري" subtitle="هدف البداية وكل التحديثات اللي وصلت لها" count={goalUpdates}><GoalJourneyCard profile={profile} onCelebrate={onCelebrate} onEditProfile={onEditProfile} /></SpaceAccordion>
                <SpaceAccordion icon="briefcase-business" title="تاسكاتي" subtitle="مكتمل، قيد التنفيذ، لسه معملتهاش وإضافاتك الخاصة" count={progress.taskTotal}><MyTasksJourney profile={profile} taskRecords={taskRecords} onOpenTask={onOpenTask} /></SpaceAccordion>
                <SpaceAccordion icon="notebook-tabs" title="ملاحظاتي" subtitle="اكتب جديد أو ارجع للملاحظات المحفوظة" count={notesCount}><NotesLibrary profile={profile} onCelebrate={onCelebrate} /></SpaceAccordion>
                <SpaceAccordion icon="boxes" title="صندوق أدواتي" subtitle="الأدوات المفضلة وإدارتها"><ToolboxManager /></SpaceAccordion>
                <SpaceAccordion icon="bot" title="مساعديني" subtitle="اختار من مساعدي الدبلومة أو أضف مساعدًا جديدًا"><AssistantsLibrary personal /></SpaceAccordion>
                <SpaceAccordion icon="sparkles" title="مهاراتي" subtitle="أضف مهاراتك ونبذة ورابط لكل مهارة"><SkillsLibrary /></SpaceAccordion>
                <SpaceAccordion icon="route" title="مساراتي" subtitle="اختار مسارًا جاهزًا أو ابنِ مسارك الخاص"><MyPathsManager /></SpaceAccordion>
            </div>;
        };

        const StudentProfilePanel = ({ profile, onEditProfile }) => (
            <div className="student-profile-panel p-5 sm:p-6 mb-6 space-y-4">
                <div className="flex flex-col lg:flex-row lg:items-center gap-4">
                    <div className="profile-avatar !w-14 !h-14 !bg-[--accent-navy] text-xl">{profile.firstName.charAt(0)}</div>
                    <div className="flex-grow"><h3 className="text-xl font-bold text-[--accent-navy] dark:text-white">{profile.firstName}</h3>{profile.profession && <p className="text-sm font-bold text-[--accent-green] mt-1">{profile.profession}</p>}<p className="text-sm text-gray-600 dark:text-gray-300 mt-1">بدأت الرحلة يوم {formatArabicDate(profile.startDate)} · {APP_PROFILE_MODE_LABEL} · {profile.gender === 'female' ? 'مؤنث' : 'مذكر'}</p></div>
                    <button onClick={onEditProfile} className="btn-brand-navy px-4 py-2 rounded-lg font-bold inline-flex items-center justify-center gap-2"><Icon name="user-cog" className="w-4 h-4" /> تعديل بياناتي</button>
                </div>
                {profile.learningGoal && <div className="goal-profile-preview"><span className="font-bold text-[--accent-green]">هدفي:</span><p className="text-sm text-gray-700 dark:text-gray-200 mt-1 whitespace-pre-wrap">{profile.learningGoal}</p></div>}
            </div>
        );

        let youtubeApiPromise = null;
        const loadYouTubeIframeApi = () => {
            if (window.YT?.Player) return Promise.resolve(window.YT);
            if (youtubeApiPromise) return youtubeApiPromise;
            youtubeApiPromise = new Promise((resolve, reject) => {
                const previousReady = window.onYouTubeIframeAPIReady;
                window.onYouTubeIframeAPIReady = () => {
                    try { previousReady?.(); } catch (error) {}
                    resolve(window.YT);
                };
                if (!document.querySelector('script[src="https://www.youtube.com/iframe_api"]')) {
                    const script = document.createElement('script');
                    script.src = 'https://www.youtube.com/iframe_api';
                    script.async = true;
                    script.onerror = () => reject(new Error('تعذر تحميل مشغل YouTube'));
                    document.head.appendChild(script);
                }
                window.setTimeout(() => { if (window.YT?.Player) resolve(window.YT); }, 1200);
            });
            return youtubeApiPromise;
        };

        const YouTubeLecturePlayer = ({ lecture }) => {
            const hostRef = useRef(null);
            const playerRef = useRef(null);
            const saveTimerRef = useRef(null);
            const positionKey = `smartYoutube:${APP_STORAGE_NAMESPACE}:${lecture.id}:position`;
            const speedKey = `smartYoutube:${APP_STORAGE_NAMESPACE}:preferredSpeed`;

            useEffect(() => {
                let cancelled = false;
                const saveProgress = () => {
                    const player = playerRef.current;
                    if (!player?.getCurrentTime) return;
                    try {
                        const current = player.getCurrentTime();
                        const duration = player.getDuration?.() || 0;
                        if (Number.isFinite(current) && current > 0 && (!duration || current < duration - 5)) localStorage.setItem(positionKey, String(current));
                        const rate = player.getPlaybackRate?.();
                        if (rate) localStorage.setItem(speedKey, String(rate));
                    } catch (error) {}
                };
                loadYouTubeIframeApi().then(YT => {
                    if (cancelled || !hostRef.current) return;
                    const startSeconds = Number(localStorage.getItem(positionKey) || 0);
                    playerRef.current = new YT.Player(hostRef.current, {
                        videoId: lecture.youtubeId,
                        width: '100%',
                        height: '100%',
                        playerVars: { playsinline: 1, rel: 0, enablejsapi: 1, origin: window.location.origin === 'null' ? undefined : window.location.origin },
                        events: {
                            onReady: event => {
                                try { event.target.getIframe?.().setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture; fullscreen'); } catch (error) {}
                                if (startSeconds > 5) event.target.seekTo(startSeconds, true);
                                const preferredRate = Number(localStorage.getItem(speedKey) || 1);
                                const rates = event.target.getAvailablePlaybackRates?.() || [];
                                if (rates.includes(preferredRate)) event.target.setPlaybackRate(preferredRate);
                            },
                            onStateChange: event => {
                                if (event.data === YT.PlayerState.PLAYING) {
                                    window.clearInterval(saveTimerRef.current);
                                    saveTimerRef.current = window.setInterval(saveProgress, 4000);
                                } else {
                                    window.clearInterval(saveTimerRef.current);
                                    saveProgress();
                                }
                                if (event.data === YT.PlayerState.ENDED) localStorage.removeItem(positionKey);
                            },
                            onPlaybackRateChange: saveProgress
                        }
                    });
                }).catch(() => {});
                const onPageHide = () => saveProgress();
                window.addEventListener('pagehide', onPageHide);
                document.addEventListener('visibilitychange', onPageHide);
                return () => {
                    cancelled = true;
                    saveProgress();
                    window.clearInterval(saveTimerRef.current);
                    window.removeEventListener('pagehide', onPageHide);
                    document.removeEventListener('visibilitychange', onPageHide);
                    try { playerRef.current?.destroy?.(); } catch (error) {}
                    playerRef.current = null;
                };
            }, [lecture.id, lecture.youtubeId]);

            return <div className="w-full h-full" ref={hostRef}></div>;
        };

        const FloatingLecturePlayer = ({ activeLecture, onClose }) => {
            const [isTheater, setIsTheater] = useState(true);
            const playerShellRef = useRef(null);
            useEffect(() => { if (activeLecture) setIsTheater(true); }, [activeLecture?.lecture?.id]);
            useEffect(() => {
                const unlockOrientation = () => { try { screen.orientation?.unlock?.(); } catch (error) {} };
                const onFullScreenChange = () => {
                    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
                    if (!isFs) unlockOrientation();
                };
                document.addEventListener('fullscreenchange', onFullScreenChange);
                document.addEventListener('webkitfullscreenchange', onFullScreenChange);
                return () => {
                    document.removeEventListener('fullscreenchange', onFullScreenChange);
                    document.removeEventListener('webkitfullscreenchange', onFullScreenChange);
                    unlockOrientation();
                };
            }, []);
            if (!activeLecture) return null;
            const { lecture, weekTitle } = activeLecture;
            const isYouTube = lecture.sourceType === 'youtube' || !!lecture.youtubeId;
            const previewUrl = !isYouTube ? (lecture.previewUrl || buildLecturePreviewUrl(lecture.fileId)) : '';
            const openFullScreen = async () => {
                const el = playerShellRef.current;
                if (!el) return;
                try {
                    if (el.requestFullscreen) await el.requestFullscreen({ navigationUI: 'hide' });
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                } catch (error) {}
                try { await screen.orientation?.lock?.('landscape'); } catch (error) {}
            };
            return (
                <>
                    {isTheater && <button type="button" aria-label="تصغير المشغل" className="player-theater-backdrop" onClick={() => setIsTheater(false)}></button>}
                    <div ref={playerShellRef} className={`premium-floating-player ${isTheater ? 'theater' : ''}`}>
                        <div className="premium-floating-header">
                            <div className="min-w-0"><p className="text-sm sm:text-base font-bold truncate">{lecture.title}</p><p className="text-xs text-white/70 truncate">{weekTitle}</p></div>
                            <div className="flex items-center gap-1 flex-shrink-0">
                                <button type="button" onClick={openFullScreen} title="ملء الشاشة"><Icon name="monitor-up" className="w-4 h-4" /></button>
                                <button type="button" onClick={() => setIsTheater(prev => !prev)} title={isTheater ? 'تصغير داخل التطبيق' : 'فتح بحجم كبير'}><Icon name={isTheater ? 'minimize-2' : 'maximize-2'} className="w-4 h-4" /></button>
                                <button type="button" onClick={onClose} title="إغلاق المحاضرة"><Icon name="x" className="w-4 h-4" /></button>
                            </div>
                        </div>
                        <div className="floating-video-frame">
                            {isYouTube ? <YouTubeLecturePlayer key={lecture.id} lecture={lecture} /> : <iframe key={lecture.id} src={previewUrl} title={`${lecture.title} - مشغل المحاضرة`} loading="eager" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowFullScreen></iframe>}
                        </div>
                    </div>
                </>
            );
        };

        const GlobalVoiceTyping = () => {
            const [target, setTarget] = useState(null);
            const [position, setPosition] = useState(null);
            const [listening, setListening] = useState(false);
            const [voiceMessage,setVoiceMessage]=useState('');
            const recognitionRef = useRef(null);
            const eligible = element => element && !element.readOnly && !element.disabled && (element.tagName === 'TEXTAREA' || (element.tagName === 'INPUT' && ['text','search','url','email','tel'].includes(element.type || 'text')));
            const updatePosition = useCallback(() => {
                if (!target || !document.body.contains(target)) return setPosition(null);
                const rect = target.getBoundingClientRect();
                if (rect.bottom < 0 || rect.top > window.innerHeight) return setPosition(null);
                setPosition({ left:Math.max(6, rect.left + 8), top:Math.max(6, rect.top + Math.max(4, (rect.height - 35) / 2)) });
            }, [target]);
            useEffect(() => {
                const onFocus = event => { if (eligible(event.target)) setTarget(event.target); };
                const onPointer = event => { if (!eligible(event.target) && !event.target.closest?.('.global-voice-button')) { setTarget(null); setPosition(null); } };
                document.addEventListener('focusin', onFocus); document.addEventListener('pointerdown', onPointer, true);
                return () => { document.removeEventListener('focusin', onFocus); document.removeEventListener('pointerdown', onPointer, true); };
            }, []);
            useEffect(() => {
                updatePosition(); window.addEventListener('scroll', updatePosition, true); window.addEventListener('resize', updatePosition);
                return () => { window.removeEventListener('scroll', updatePosition, true); window.removeEventListener('resize', updatePosition); };
            }, [updatePosition]);
            const setNativeValue = (element, value) => {
                const previousValue=element.value;
                const prototype = element.tagName === 'TEXTAREA' ? window.HTMLTextAreaElement.prototype : window.HTMLInputElement.prototype;
                const setter = Object.getOwnPropertyDescriptor(prototype, 'value')?.set;
                setter?.call(element, value);
                element._valueTracker?.setValue(previousValue);
                element.dispatchEvent(new Event('input', { bubbles:true }));
                element.dispatchEvent(new Event('change', { bubbles:true }));
            };
            const explainError=error=>{
                const messages={
                    'not-allowed':'اسمح للتطبيق باستخدام الميكروفون من علامة القفل جنب رابط الصفحة.',
                    'service-not-allowed':'خدمة تحويل الصوت مقفولة في المتصفح.',
                    'audio-capture':'المتصفح مش لاقي ميكروفون متاح.',
                    'no-speech':'مسمعتش صوت واضح. اضغط المايك وحاول تاني.',
                    'network':'تحويل الصوت محتاج اتصال بالإنترنت.',
                    'aborted':'تم إيقاف الكتابة بالصوت.'
                };
                setVoiceMessage(messages[error]||'حصلت مشكلة في تحويل الصوت. جرّب Chrome أو Edge وتأكد من إذن الميكروفون.');
            };
            const toggleVoice = async () => {
                if (listening) { recognitionRef.current?.stop(); return; }
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) { setVoiceMessage('الكتابة بالصوت مش مدعومة هنا. افتح التطبيق على Chrome أو Edge.'); return; }
                if (!target) return;
                setVoiceMessage('');
                try {
                    if(navigator.mediaDevices?.getUserMedia){const stream=await navigator.mediaDevices.getUserMedia({audio:true});stream.getTracks().forEach(track=>track.stop());}
                } catch(error) { explainError(error?.name==='NotAllowedError'?'not-allowed':'audio-capture'); return; }
                const start=target.selectionStart ?? target.value.length; const end=target.selectionEnd ?? target.value.length;
                const before=target.value.slice(0,start); const after=target.value.slice(end); const spacer=before && !/\s$/.test(before)?' ':'';
                const recognition = new SpeechRecognition(); recognition.lang='ar-EG'; recognition.interimResults=true; recognition.continuous=false; recognition.maxAlternatives=1;
                recognition.onstart=()=>{setListening(true);setVoiceMessage('اتكلم دلوقتي… كلامك هيتكتب تلقائيًا.');};
                recognition.onresult = event => {
                    const transcript = Array.from(event.results).map(result=>result[0]?.transcript || '').join(' ').trim();
                    if (!transcript) return;
                    setNativeValue(target, `${before}${spacer}${transcript}${after}`); target.focus();
                };
                recognition.onerror = event => {setListening(false);explainError(event.error);};
                recognition.onend = () => {setListening(false);setVoiceMessage(current=>current.startsWith('اتكلم')?'تمت الكتابة. اضغط المايك تاني لو حابب تكمل.':current);};
                recognitionRef.current=recognition;
                try { recognition.start(); } catch(error) { explainError('aborted'); }
            };
            if (!target || !position) return null;
            return <><button type="button" onMouseDown={e=>e.preventDefault()} onClick={toggleVoice} className={`global-voice-button ${listening?'listening':''}`} style={{left:position.left,top:position.top}} title={listening?'إيقاف الكتابة بالصوت':'اكتب بصوتك'} aria-label={listening?'إيقاف الكتابة بالصوت':'اكتب بصوتك'}><Icon name={listening?'square':'mic'} className="w-4 h-4" /></button>{voiceMessage&&<div className="fixed z-[139] max-w-[260px] rounded-xl bg-[--accent-navy] text-white text-xs font-bold px-3 py-2 shadow-xl" style={{left:Math.max(6,Math.min(window.innerWidth-270,position.left+43)),top:position.top}}>{voiceMessage}<button type="button" onClick={()=>setVoiceMessage('')} className="mr-2 text-[--accent-green]">×</button></div>}</>;
        };

        // Main App Component
        const App = () => {
            const [theme, setTheme] = useState('light');
            const [activeTab, setActiveTab] = useState('home');
            const [modalMessage, setModalMessage] = useState(null);
            const [taskFocusIndex, setTaskFocusIndex] = useState(null);
            const [taskFocusId, setTaskFocusId] = useState(null);
            const [lectureFocusIndex, setLectureFocusIndex] = useState(null);
            const [floatingLecture, setFloatingLecture] = useState(null);
            const [profile, setProfile] = useState(() => safeJsonParse(localStorage.getItem(PROFILE_KEY), null));
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [achievement, setAchievement] = useState(null);
            const currentWeekIndex = getCurrentWeekIndex(profile);

            useEffect(() => { const storedTheme = localStorage.getItem('theme'); const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches; setTheme(storedTheme === 'dark' || (!storedTheme && prefersDark) ? 'dark' : 'light'); }, []);
            useEffect(() => { if (theme === 'dark') document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); localStorage.setItem('theme', theme); }, [theme]);
            const saveProfile = (nextProfile) => { const normalized = { ...nextProfile, learningMode: FORCE_LEARNING_MODE }; localStorage.setItem(PROFILE_KEY, JSON.stringify(normalized)); setProfile(normalized); setIsEditingProfile(false); };
            const celebrate = useCallback((type) => {
                if (!profile) return;
                const messages = {
                    lecture: { icon: 'headphones', title: `عاش يا ${profile.firstName}!`, text: `${getStudentWord(profile, 'خلصت', 'خلصتي')} محاضرة جديدة — خطوة جديدة تخلي استخدامك للـ AI أذكى وأقوى.` },
                    task: { icon: 'trophy', title: `برافو يا ${profile.firstName}!`, text: `${getStudentWord(profile, 'أنجزت', 'أنجزتي')} خطوة مهمة؛ التطبيق هو اللي بيحوّل المعلومة لمهارة.` },
                    note: { icon: 'notebook-pen', title: 'فكرة اتحفظت 💚', text: 'ملاحظتك بقت جزءًا من مكتبتك الشخصية، وتقدر ترجع لها وتطورها في أي وقت.' },
                    goal: { icon: 'target', title: `مراجعة مهمة يا ${profile.firstName}!`, text: `${getStudentWord(profile, 'وقفت', 'وقفتي')} وشفت وصلت لفين؛ وده جزء أساسي من رحلة التعلم.` }
                };
                setAchievement(messages[type] || messages.task);
            }, [profile]);
            const handleTabChange = useCallback((tabId) => { if (tabId === 'tasks') setTaskFocusId(null); setActiveTab(tabId); window.scrollTo(0, 0); }, []);
            const navigate = useCallback((tabId, weekIndex = null) => {
                if (tabId === 'tasks') { setTaskFocusId(null); if (weekIndex !== null) setTaskFocusIndex(weekIndex); }
                if (tabId === 'lectures' && weekIndex !== null) setLectureFocusIndex(weekIndex);
                setActiveTab(tabId); window.scrollTo(0, 0);
            }, []);
            const handleOpenTaskWeek = useCallback((weekIndex) => { setTaskFocusId(null); setTaskFocusIndex(weekIndex); setActiveTab('tasks'); window.setTimeout(() => document.getElementById(`task-week-${weekIndex}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 120); }, []);
            const handleOpenExactTask = useCallback((weekIndex, taskId) => { setTaskFocusIndex(weekIndex); setTaskFocusId(taskId); setActiveTab('tasks'); window.setTimeout(() => document.getElementById(`task-item-${encodeURIComponent(taskId)}`)?.scrollIntoView({ behavior:'smooth', block:'center' }), 260); }, []);
            const handleFloatLecture = useCallback(({ weekTitle, lecture }) => setFloatingLecture({ weekTitle, lecture }), []);
            const tabPanelClass = (tabId) => activeTab === tabId ? 'tab-content-anim' : 'tab-panel-hidden';
            return (
                <div id="app-content">
                    {(!profile || isEditingProfile) && <OnboardingModal initialProfile={isEditingProfile ? profile : null} onSave={saveProfile} onCancel={() => setIsEditingProfile(false)} />}
                    <AchievementToast achievement={achievement} onClose={() => setAchievement(null)} />
                    {modalMessage && <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[999] p-4" onClick={() => setModalMessage(null)}><div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-lg text-center w-full max-w-sm" onClick={e => e.stopPropagation()}><Icon name="info" className="w-14 h-14 text-[--accent-green] mx-auto mb-4" /><p className="text-gray-700 dark:text-gray-200 mb-6 leading-relaxed">{modalMessage}</p><button onClick={() => setModalMessage(null)} className="btn-action-gradient font-bold py-2.5 px-8 rounded-lg">تمام</button></div></div>}
                    <Header theme={theme} onThemeToggle={() => setTheme(prev => prev === 'light' ? 'dark' : 'light')} profile={profile} onEditProfile={() => setIsEditingProfile(true)} />
                    <main className="app-main-safe container mx-auto p-4 md:p-8 relative">
                        {profile && <>
                            <div className={tabPanelClass('home')} aria-hidden={activeTab !== 'home'}><HomeTab profile={profile} currentWeekIndex={currentWeekIndex} onNavigate={navigate} onEditProfile={() => setIsEditingProfile(true)} onCelebrate={celebrate} /></div>
                            <div className={tabPanelClass('lectures')} aria-hidden={activeTab !== 'lectures'}><LecturesTab setModalMessage={setModalMessage} onOpenTaskWeek={handleOpenTaskWeek} onFloatLecture={handleFloatLecture} currentWeekIndex={currentWeekIndex} focusWeekIndex={lectureFocusIndex} onCelebrate={celebrate} /></div>
                            <div className={tabPanelClass('tasks')} aria-hidden={activeTab !== 'tasks'}><TasksTab focusWeekIndex={taskFocusIndex} focusTaskId={taskFocusId} currentWeekIndex={currentWeekIndex} profile={profile} onCelebrate={celebrate} /></div>
                            <div className={tabPanelClass('notes')} aria-hidden={activeTab !== 'notes'}><MySpace profile={profile} onCelebrate={celebrate} onEditProfile={() => setIsEditingProfile(true)} onOpenTask={handleOpenExactTask} /></div>
                            <div className={tabPanelClass('bonus')} aria-hidden={activeTab !== 'bonus'}><BonusTab /></div>
                            <div className={tabPanelClass('more')} aria-hidden={activeTab !== 'more'}><StudentProfilePanel profile={profile} onEditProfile={() => setIsEditingProfile(true)} /><MoreTab /></div>
                        </>}
                    </main>
                    <FloatingLecturePlayer activeLecture={floatingLecture} onClose={() => setFloatingLecture(null)} />
                    <GlobalVoiceTyping />
                    {profile && <BottomNav activeTab={activeTab} onTabChange={handleTabChange} />}
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
    <script>
        function setupWelcomeScreen() {
            const welcomeScreen = document.getElementById('welcome-screen');
            const appContent = document.getElementById('root');
            const startBtn = document.getElementById('start-btn');
            const titleEl = document.getElementById('welcome-title');
            const subtitleEl = document.getElementById('welcome-subtitle');
            const titleText = "Smarter With AI";
            const savedProfile = (() => { try { return JSON.parse(localStorage.getItem('smarterStudentProfileV1:round4-completed') || 'null'); } catch(e) { return null; } })();
            const subtitleText = savedProfile?.firstName ? `أهلاً بعودتك يا ${savedProfile.firstName} 💚` : "أهلاً بيك في Smarter With AI 💚";

            function applyTypewriter(element, text, speed, direction, callback) {
                let i = 0; element.innerHTML = "";
                element.classList.add('typewriter-anim', (direction === 'ltr' ? 'typewriter-ltr' : 'typewriter-rtl'));
                function type() {
                    if (i < text.length) { element.innerHTML += text.charAt(i); i++; setTimeout(type, speed); }
                    else { setTimeout(() => { element.classList.remove('typewriter-anim', 'typewriter-ltr', 'typewriter-rtl'); if (callback) callback(); }, 500); }
                }
                type();
            }

            setTimeout(() => {
                applyTypewriter(titleEl, titleText, 100, 'ltr', () => {
                    setTimeout(() => {
                        applyTypewriter(subtitleEl, subtitleText, 75, 'rtl', () => {
                            setTimeout(() => { startBtn.classList.remove('opacity-0'); startBtn.classList.add('animate-fadeInUp', 'pulse-animate'); }, 500);
                        });
                    }, 300);
                });
            }, 1500);

            startBtn.addEventListener('click', () => {
                welcomeScreen.classList.add('opacity-0');
                setTimeout(() => {
                    welcomeScreen.style.display = 'none';
                    if (appContent) appContent.classList.remove('hidden');
                }, 700);
            });
        }
        document.addEventListener('DOMContentLoaded', setupWelcomeScreen);
    </script>
</body>
</html>
