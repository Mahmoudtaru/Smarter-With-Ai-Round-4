                {item.tip&&<div className="journey-summary-box"><strong className="text-[--accent-green]">نصيحة للمسار</strong><p className="mt-1 text-gray-700 dark:text-gray-200">{item.tip}</p></div>}
            </div>;
            return <section className="space-section space-y-4"><div className="flex flex-col sm:flex-row sm:items-center gap-3"><div className="flex-grow"><h3 className="space-section-heading"><Icon name="route" className="w-5 h-5 text-[--accent-green]" /> مساراتي</h3><p className="text-sm text-gray-500 dark:text-gray-300 mt-1">المسار المحفوظ يفتح بتفاصيله، وتقدر تبنيه بأدواته ومساعديه ومهاراته.</p></div><button type="button" onClick={()=>setShowBuilder(prev=>!prev)} className="btn-brand-navy px-4 py-2.5 rounded-lg font-bold"><Icon name="plus" className="w-4 h-4 inline ml-1" /> إضافة مسار</button></div>
                {saved.length?<div className="grid md:grid-cols-2 gap-3">{saved.map(item=><article key={item.id} className="favorite-tool-card"><button type="button" onClick={()=>setPreview(item)} className="w-full text-right"><span className="task-link-type">{item.category||'مسار'}</span><strong className="block text-[--accent-navy] dark:text-white text-lg mt-2">{item.title}</strong>{item.goal&&<p className="text-sm text-gray-500 dark:text-gray-300 mt-2 line-clamp-2">{item.goal}</p>}<span className="inline-flex items-center gap-1 text-sm font-bold text-[--accent-green] mt-3"><Icon name="eye" className="w-4 h-4" /> فتح تفاصيل المسار</span></button><div className="border-t border-gray-200 dark:border-slate-600 mt-3 pt-3 flex justify-end"><button type="button" onClick={()=>toggle(item)} className="text-yellow-500 inline-flex items-center gap-2 text-sm font-bold"><Icon name="star" className="w-5 h-5 fill-current" /> إزالة من مساراتي</button></div></article>)}</div>:<div className="notes-empty-state p-6 text-center">اضغط «إضافة مسار» واختار مسارًا جاهزًا أو ابنِ مسارك.</div>}
                {showBuilder&&<div className="task-section-card space-y-4"><div className="grid grid-cols-2 gap-2 bg-gray-100 dark:bg-slate-900 p-1.5 rounded-xl"><button type="button" onClick={()=>setBuilderMode('catalog')} className={`p-2.5 rounded-lg font-bold ${builderMode==='catalog'?'bg-[--accent-navy] text-white':'text-gray-600 dark:text-gray-200'}`}>من مسارات الدبلومة</button><button type="button" onClick={()=>setBuilderMode('new')} className={`p-2.5 rounded-lg font-bold ${builderMode==='new'?'bg-[--accent-navy] text-white':'text-gray-600 dark:text-gray-200'}`}>ابنِ مسارًا جديدًا</button></div>{builderMode==='catalog'?<><input className="app-field" value={pathQuery} onChange={e=>setPathQuery(e.target.value)} placeholder="ابحث عن مسار حسب هدفك..." /><div className="grid md:grid-cols-2 gap-3 max-h-[620px] overflow-auto pr-1">{filteredCatalog.map(item=><article key={item.id} className={`tool-pick-card ${selected.includes(item.id)?'selected':''}`}><button type="button" onClick={()=>setPreview(item)} className="w-full text-right"><strong className="text-[--accent-navy] dark:text-white">{item.title}</strong><p className="text-xs text-gray-500 dark:text-gray-300 mt-2 line-clamp-2">{item.goal}</p></button><button type="button" onClick={()=>toggle(item)} className={`mt-3 w-full rounded-lg px-3 py-2 font-bold ${selected.includes(item.id)?'bg-[--accent-navy] text-white':'btn-brand-primary'}`}><Icon name="star" className={`w-4 h-4 inline ml-1 ${selected.includes(item.id)?'fill-current':''}`} /> {selected.includes(item.id)?'محفوظ في مساراتي':'إضافة إلى مساراتي'}</button></article>)}</div></>:<div className="space-y-4"><div className="grid sm:grid-cols-2 gap-3"><input className="app-field" value={draft.title} onChange={e=>setDraft({...draft,title:e.target.value})} placeholder="اسم المسار" /><select className="app-field" value={draft.category} onChange={e=>setDraft({...draft,category:e.target.value})}>{categories.map(category=><option key={category}>{category}</option>)}</select></div><textarea className="app-field min-h-[90px]" value={draft.goal} onChange={e=>setDraft({...draft,goal:e.target.value})} placeholder="هتطلع من المسار بإيه؟" /><textarea className="app-field min-h-[130px]" value={draft.steps} onChange={e=>setDraft({...draft,steps:e.target.value})} placeholder="خطوات المسار — كل خطوة في سطر" /><details className="space-accordion"><summary><span className="space-accordion-icon"><Icon name="wrench" className="w-5 h-5" /></span><span className="flex-grow"><strong>أدوات المسار</strong><small>اختياري — اختار من بنك الأدوات</small></span><span className="task-link-type">{draft.tools.length}</span></summary><div className="space-accordion-body"><div className="tool-picker-grid max-h-[420px] overflow-auto">{toolOptions.map(tool=>{const active=draft.tools.some(row=>toolIdentity(row)===toolIdentity(tool));return <button type="button" key={toolIdentity(tool)} onClick={()=>toggleDraftList('tools',tool,toolIdentity)} className={`tool-pick-card text-right ${active?'selected':''}`}><strong>{tool.name}</strong><span className="block text-xs text-gray-500 dark:text-gray-300 mt-1">{tool.category}</span></button>})}</div></div></details><details className="space-accordion"><summary><span className="space-accordion-icon"><Icon name="bot" className="w-5 h-5" /></span><span className="flex-grow"><strong>مساعدو المسار</strong><small>اختياري — اختار من دليل المساعدين</small></span><span className="task-link-type">{draft.assistants.length}</span></summary><div className="space-accordion-body"><div className="grid md:grid-cols-2 gap-2 max-h-[420px] overflow-auto">{assistantOptions.map(assistant=>{const active=draft.assistants.some(row=>row.id===assistant.id);return <button type="button" key={assistant.id} onClick={()=>toggleDraftList('assistants',assistant,row=>row.id)} className={`tool-pick-card text-right ${active?'selected':''}`}><strong>{assistant.name}</strong><span className="block text-xs text-gray-500 dark:text-gray-300 mt-1">{assistant.category}</span></button>})}</div></div></details><details className="space-accordion"><summary><span className="space-accordion-icon"><Icon name="sparkles" className="w-5 h-5" /></span><span className="flex-grow"><strong>مهارات المسار</strong><small>اختياري — اختار من مهاراتك المحفوظة</small></span><span className="task-link-type">{draft.skills.length}</span></summary><div className="space-accordion-body">{skillOptions.length?<div className="grid md:grid-cols-2 gap-2 max-h-[420px] overflow-auto">{skillOptions.map(skill=>{const active=draft.skills.some(row=>row.id===skill.id);return <button type="button" key={skill.id} onClick={()=>toggleDraftList('skills',skill,row=>row.id)} className={`tool-pick-card text-right ${active?'selected':''}`}><strong>{skill.name}</strong>{skill.desc&&<span className="block text-xs text-gray-500 dark:text-gray-300 mt-1">{skill.desc}</span>}</button>})}</div>:<div className="notes-empty-state p-5 text-center"><p className="font-bold text-[--accent-navy] dark:text-white">أضف مهاراتك الأول من قائمة «مهاراتي»</p></div>}</div></details><button type="button" onClick={saveCustom} className="btn-brand-primary w-full px-5 py-3 rounded-xl font-bold"><Icon name="save" className="w-5 h-5 inline ml-1" /> حفظ المسار في مساحتي</button></div>}</div>}
                {preview&&<div className="fixed inset-0 z-[100] bg-slate-950/75 backdrop-blur-sm p-3 sm:p-6 flex items-center justify-center" onClick={()=>setPreview(null)}><div className="content-card w-full max-w-3xl max-h-[88vh] overflow-auto rounded-2xl p-5 sm:p-7" onClick={e=>e.stopPropagation()}><div className="flex justify-end mb-2"><button type="button" onClick={()=>setPreview(null)} className="task-mini-icon-btn"><Icon name="x" className="w-5 h-5" /></button></div><PathDetails item={preview} /><div className="mt-6 flex flex-wrap gap-2"><button type="button" onClick={()=>toggle(preview)} className="btn-brand-primary px-5 py-3 rounded-xl font-bold"><Icon name="star" className={`w-5 h-5 inline ml-1 ${selected.includes(preview.id)?'fill-current':''}`} /> {selected.includes(preview.id)?'إزالة من مساراتي':'إضافة إلى مساراتي'}</button><button type="button" onClick={()=>setPreview(null)} className="share-card-button">إغلاق</button></div></div></div>}
            </section>;
        };

        const ToolCard = ({ category, isOpen, onToggle }) => {
            const categoryId = `tool-category-${category.title.replace(/\s+/g, '-')}`;
            return (
                 <div id={categoryId} className={`content-card rounded-lg overflow-hidden shadow-md transition-all duration-500 ${isOpen ? 'ring-2 ring-[--accent-green]' : ''}`}>
                    <button
                        aria-expanded={isOpen}
                        className="accordion-header w-full text-right p-5 flex items-center justify-between text-lg sm:text-xl font-semibold hover:bg-gray-100 dark:hover:bg-gray-100 focus:outline-none"
                        onClick={onToggle}
                    >
                        <span className="flex items-center gap-3">
                            <Icon name={category.icon} />
                            <span>{category.title}</span>
                        </span>
                        <Icon name="chevron-down" className={`transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    <div
                        className="accordion-content"
                        style={{ maxHeight: isOpen ? '5000px' : '0' }}
                    >
                        <div className="p-5 border-t border-gray-200">
                            {category.subCategories ? (
                                <div className="space-y-5 pt-2">
                                    {category.subCategories.map((sub, sIdx) => (
                                        <div key={sIdx}>
                                            <h5 className="font-bold text-[--accent-green] text-lg mb-2 border-b border-gray-100 dark:border-gray-700 pb-1">{sub.title}</h5>
                                            <ul className="list-disc list-inside space-y-2 text-gray-700 dark:text-gray-300">
                                                {sub.tools.map((tool, index) => (
                                                    <li key={index} className="hover:text-[--accent-green] transition-colors">
                                                        <a href={tool.url} target="_blank" rel="noopener noreferrer">{tool.name}</a>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <ul className="list-disc list-inside space-y-2 pt-2 text-gray-700 dark:text-gray-300">
                                    {category.tools.map((tool, index) => (
                                        <li key={index} className="hover:text-[--accent-green] transition-colors">
                                            <a href={tool.url} target="_blank" rel="noopener noreferrer">{tool.name}</a>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const BonusTab = () => {
            const [openAccordion, setOpenAccordion] = useState(null);
            const [openNestedAccordion, setNestedAccordion] = useState(null);
            const [openWorkflowAccordion, setOpenWorkflowAccordion] = useState(null);
            const [openToolAccordion, setOpenToolAccordion] = useState(null);

            const handleToggle = (title) => {
                setOpenAccordion(openAccordion === title ? null : title);
            };

            const handleNestedToggle = (title) => {
                setNestedAccordion(openNestedAccordion === title ? null : title);
            };
            
            const handleWorkflowToggle = (id) => {
                setOpenWorkflowAccordion(openWorkflowAccordion === id ? null : id);
            };

            const handleToolToggle = (title) => {
                setOpenToolAccordion(openToolAccordion === title ? null : title);
            };

            const scrollToToolCategory = (categoryTitle) => {
                setOpenToolAccordion(categoryTitle);
                setTimeout(() => {
                    const element = document.getElementById(`tool-category-${categoryTitle.replace(/\s+/g, '-')}`);
                    if (element) {
                        const yOffset = -80; 
                        const y = element.getBoundingClientRect().top + window.pageYOffset + yOffset;
                        window.scrollTo({top: y, behavior: 'smooth'});
                    }
                }, 300);
            };

            const reminderText = "ملاحظة هامة: هذا القسم متجدد باستمرار ويضم ترشيحات لأفضل الأدوات والمصادر التي أرى أنها ستضيف قيمة حقيقية لمهاراتك في العمل والدراسة. تفقده دائمًا لاكتشاف الجديد.";

            return (
                <div className="space-y-8">
                    <Reminder>{reminderText}</Reminder>
                    
                    <div className="text-center">
                         <a 
                            href="https://t.me/c/3331953900/11" 
                            target="_blank"
                            className="btn-action-gradient hover:opacity-90 font-medium rounded-lg text-lg px-8 py-3 text-center transition-transform transform hover:scale-105 inline-flex items-center justify-center gap-2 shadow-md"
                        >
                            <Icon name="gift" className="w-5 h-5"/>
                            <span>الذهاب إلى قناة البونص (تليجرام)</span>
                        </a>
                    </div>

                    <div className="workflows-highlight-card border-2 border-[--accent-green] rounded-xl p-6 text-center shadow-md transform transition-all hover:scale-[1.01]">
                        <a 
                            href="https://mahmoudtaru.github.io/Smarter-Workflows/" 
                            target="_blank"
                            rel="noopener noreferrer"
                            className="btn-brand-primary hover:opacity-90 font-bold rounded-lg text-lg sm:text-xl px-8 py-3 text-center transition-transform transform hover:scale-105 inline-flex flex-wrap items-center justify-center gap-3 shadow-md w-full sm:w-auto"
                        >
                            <Icon name="route" className="w-6 h-6"/>
                            <span>مسارات Workflows - أذكى بمساعدة الذكاء الاصطناعي</span>
                        </a>
                        <p className="workflows-highlight-copy mt-4 font-bold text-base sm:text-lg">
                            مساراتك، أدواتك، مساعدينك في مكان واحد
                        </p>
                    </div>

                    <div className="space-y-4">
                        
                        <Accordion 
                            title="أدوات الدبلومة (Smarter Tools)" 
                            isOpen={openAccordion === "smarter_tools"} 
                            onToggle={() => handleToggle("smarter_tools")}
                        >
                            <HeroToolCard
                                title="Smarter Notebook (نوت بوك الدبلومة)"
                                icon="book-open"
                                description="تحتوي على جميع محاضرات الدبلومة. تقدر تسألها وترد عليك من المحتوى."
                                featuresTitle="متوفر لكل محاضرة:"
                                features={["اختبار", "فلاش كارد", "بريزنتيشن", "انفوجرافيك", "فيديو", "بودكاست صوتي"]}
                                linkUrl="https://notebooklm.google.com/notebook/7b7f75b1-77f6-4363-ada6-84c730d6bfc7"
                                linkLabel="فتح النوت بوك"
                            />
                            <div className="my-4"></div>
                            <HeroToolCard
                                title="Smarter Assistant (مساعد الدبلومة)"
                                icon="bot"
                                description="مساعد شخصي على جيمناي مربوط بالنوت بوك الخاصة بالدبلومة."
                                featuresTitle="هدفه:"
                                features={["شرح أي شيء مش واضح", "التطبيق على المحتوى", "ترشيح تطبيقات تناسب تخصصك واهتماماتك"]}
                                linkUrl="https://gemini.google.com/gem/1iO5UkN9OqLiCY1TaRgP01ZN0qRbV4n0C?usp=sharing"
                                linkLabel="فتح المساعد الشخصي"
                            />
                            <div className="my-4"></div>
                            <HeroToolCard
                                title="المحاضرات الصوتية (Audio Format)"
                                icon="headphones"
                                description="نوفر جميع المحاضرات بصيغة صوتية (MP3)."
                                featuresTitle="مثالية لـ:"
                                features={["الاستماع أثناء التنقل", "إنشاء NotebookLM خاصة بك", "التطبيق العملي على محتوى الدبلومة"]}
                                linkUrl="https://drive.google.com/drive/folders/12ocuaoGLzCgytmdAMme6PpIO9vlHu86E?usp=sharing"
                                linkLabel="فتح مكتبة المحاضرات الصوتية"
                            />
                            <div className="my-4"></div>
                            <HeroToolCard
                                title="Smarter Gifts (موقع المساعدين الشخصيين)"
                                icon="gift"
                                description="موقع شامل يضم كافة المساعدين الشخصيين الجاهزين والمصممين خصيصاً لمختلف التخصصات لتسهيل عملك اليومي."
                                featuresTitle="مميزات الموقع:"
                                features={["مساعدون في مختلف المجالات", "جاهزون للاستخدام المباشر", "تحديثات مستمرة", "يوفر وقت بناء الأوامر"]}
                                linkUrl="https://mahmoudtaru.github.io/Smarter-Gifts/"
                                linkLabel="زيارة موقع المساعدين"
                            />
                            <div className="my-4"></div>
                            <HeroToolCard
                                title="شرح المساعدين (المحاضرة)"
                                icon="play-circle"
                                description="محاضرة تفصيلية تشرح كيفية استخدام المساعدين الشخصيين وتطبيقهم عملياً لزيادة إنتاجيتك وتحقيق أقصى استفادة."
                                featuresTitle="تتضمن المحاضرة:"
                                features={["فهم آلية عمل المساعدين", "تطبيقات وأمثلة عملية", "أفضل الممارسات", "كيفية دمجهم في مسار عملك"]}
                                linkUrl="https://t.me/c/3331953900/11/29"
                                linkLabel="مشاهدة المحاضرة"
                            />
                        </Accordion>

                        <Accordion
                            title="مساعدو الدبلومة (Smarter Assistants)"
                            isOpen={openAccordion === "smarter_assistants"}
                            onToggle={() => handleToggle("smarter_assistants")}
                        >
                            <AssistantsLibrary />
                        </Accordion>

                        {/* Workflows Accordion (الدليل العملي لمسارات الذكاء الاصطناعي) */}
                        <Accordion 
                            title="مسارات Workflows (الدليل المفصل)" 
                            isOpen={openAccordion === "workflows"} 
                            onToggle={() => handleToggle("workflows")}
                        >
                            <div className="bg-white dark:bg-slate-800 p-4 rounded-lg mb-6 text-gray-700 dark:text-gray-300 leading-relaxed text-sm sm:text-base border border-gray-200 dark:border-gray-700 shadow-sm">
                                <h4 className="font-bold text-[--accent-navy] dark:text-[--accent-green] mb-2">الدليل العملي المفصل لمسارات الذكاء الاصطناعي (AI Workflows Playbook)</h4>
                                <p>هذا الدليل هو المرجع الشامل لك داخل دبلومة "Smarter With AI". لا تقم بحفظ أسماء الأدوات، بل اتبع المسار الذي يحل مشكلتك الحالية، اقرأ الطريقة المفصلة، استخدم الأداة المناسبة، وانسخ رابط المساعد لتبدأ فوراً.</p>
                            </div>

                            {workflowsData.map((workflow) => (
                                <NestedAccordion 
                                    key={workflow.id} 
                                    title={workflow.title} 
                                    icon={workflow.icon} 
                                    isOpen={openWorkflowAccordion === workflow.id} 
                                    onToggle={() => handleWorkflowToggle(workflow.id)}
                                >
                                    <div className="space-y-5">
                                        <div className="bg-white dark:bg-slate-800 p-4 rounded-md border border-gray-200 dark:border-gray-700">
                                            <h5 className="font-bold text-gray-700 dark:text-gray-300 mb-3 flex items-center gap-2">
                                                <Icon name="target" className="w-5 h-5 text-gray-500 dark:text-gray-400"/> 
                                                حدد احتياجك:
                                            </h5>
                                            <ul className="list-disc list-inside space-y-1 text-gray-600 dark:text-gray-400 text-sm sm:text-base pr-2">
                                                {workflow.needs.map((need, i) => <li key={i}>{need}</li>)}
                                            </ul>
                                        </div>

                                        <div className="mb-6">
                                            <h5 className="font-bold text-gray-700 dark:text-gray-300 mb-3 flex items-center gap-2">
                                                <Icon name="list" className="w-5 h-5 text-gray-500 dark:text-gray-400"/> 
                                                الطرق المفصلة للتنفيذ:
                                            </h5>
                                            <div className="space-y-4 text-sm sm:text-base text-gray-600 dark:text-gray-400 leading-relaxed pr-2">
                                                {workflow.methods.map((method, i) => (
                                                    <div key={i}>
                                                        <span className="font-bold text-[--accent-green]">{method.title}</span>{' '}
                                                        <span>{method.text}</span>
                                                        {method.steps && (
                                                            <ul className="list-disc list-inside pr-4 space-y-2 mt-2">
                                                                {method.steps.map((step, j) => <li key={j}>{step}</li>)}
                                                            </ul>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-gray-50 dark:bg-slate-800/50 rounded-lg p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 border border-gray-200 dark:border-gray-700">
                                            <div className="flex items-center flex-wrap gap-2 text-sm sm:text-base w-full justify-between">
                                                 <div className="flex items-center gap-2">
                                                     <span className="font-bold text-gray-700 dark:text-gray-300">الأدوات:</span>
                                                     <span className="text-[--accent-green] font-bold">{workflow.toolsList.join(' | ')}</span>
                                                 </div>
                                                 {workflow.targetCategory && (
                                                     <button 
                                                        onClick={() => scrollToToolCategory(workflow.targetCategory)} 
                                                        className="bg-[#92b43b] text-white text-xs sm:text-sm font-bold px-4 py-2 rounded flex items-center justify-center gap-2 whitespace-nowrap hover:bg-[#7a9632] transition-colors shadow-sm"
                                                    >
                                                         <span>الذهاب لقائمة ({workflow.targetCategory})</span>
                                                         <Icon name="arrow-left" className="w-4 h-4"/> 
                                                     </button>
                                                 )}
                                            </div>
                                        </div>

                                        {workflow.assistantsGroups && workflow.assistantsGroups.length > 0 && (
                                            <div className="mb-6">
                                                 <h5 className="font-bold text-gray-700 dark:text-gray-300 mb-3 flex items-center gap-2 text-base">
                                                     <Icon name="bot" className="w-5 h-5 text-gray-500 dark:text-gray-400"/> 
                                                     المساعدون (GPTs):
                                                 </h5>
                                                 <div className="bg-gray-50 dark:bg-slate-800/30 rounded-xl p-4 border border-gray-200 dark:border-gray-700 space-y-4">
                                                     {workflow.assistantsGroups.map((group, i) => (
                                                         <div key={i} className="flex flex-col sm:flex-row sm:items-start justify-between gap-4 border-b border-gray-200 dark:border-gray-700 last:border-0 pb-4 last:pb-0">
                                                             <div className="flex items-start gap-2 text-sm sm:text-base font-bold text-gray-800 dark:text-gray-200">
                                                                 <Icon name="user" className="w-4 h-4 text-[--accent-green] mt-1 flex-shrink-0" />
                                                                 <div>
                                                                     <span>{group.title}</span>
                                                                     {group.description && <p className="text-xs text-gray-500 dark:text-gray-400 mt-1 font-normal leading-relaxed">{group.description}</p>}
                                                                 </div>
                                                             </div>

        const collectAllNotes = () => {
            const rows = [];
            lecturesData.forEach((week, weekIndex) => (week.lectures || []).forEach(lecture => {
                const key = `smartLecture:${APP_STORAGE_NAMESPACE}:${lecture.id || `${week.title}-${lecture.title}`}:notes`;
                const lectureNotes = safeJsonParse(localStorage.getItem(key), []);
                lectureNotes.forEach(note => rows.push({ ...note, title: note.title || 'ملاحظة بدون عنوان', weekIndex, weekTitle: week.title, lectureId: lecture.id, lectureTitle: lecture.title, storageKey: key }));
            }));
            safeJsonParse(localStorage.getItem(PERSONAL_NOTES_KEY), []).forEach(note => rows.push({ ...note, title:note.title || 'ملاحظة بدون عنوان', weekIndex:-1, weekTitle:'ملاحظات عامة', lectureId:'personal', lectureTitle:'', storageKey:PERSONAL_NOTES_KEY }));
            return rows.sort((a, b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt));
        };
        const updateStoredNote = (row, patch) => {
            const list = safeJsonParse(localStorage.getItem(row.storageKey), []);
            const next = list.map(item => item.id === row.id ? { ...item, ...patch, updatedAt: new Date().toISOString() } : item);
            localStorage.setItem(row.storageKey, JSON.stringify(next));
            dispatchSmarterEvent('smarter-notes-external-update', { lectureId: row.lectureId });
            dispatchSmarterEvent('smarter-notes-updated');
        };
        const removeStoredNote = (row) => {
            const list = safeJsonParse(localStorage.getItem(row.storageKey), []);
            localStorage.setItem(row.storageKey, JSON.stringify(list.filter(item => item.id !== row.id)));
            dispatchSmarterEvent('smarter-notes-external-update', { lectureId: row.lectureId });
            dispatchSmarterEvent('smarter-notes-updated');
        };

        const NOTE_TYPES = [
            { id:'text', label:'نص', icon:'align-right' },
            { id:'steps', label:'خطوات', icon:'list-ordered' },
            { id:'checklist', label:'Checklist / To-do', icon:'list-checks' }
        ];
        const getNoteTypeLabel = type => NOTE_TYPES.find(item=>item.id===(type||'text'))?.label || 'نص';
        const noteLines = note => String(note.text || '').split('\n').map(row=>row.trim()).filter(Boolean);
        const formatNoteContent = note => {
            const lines=noteLines(note);
            if((note.noteType||'text')==='steps') return lines.map((line,index)=>`${index+1}. ${line.replace(/^\d+[.)-]?\s*/, '')}`).join('\n');
            if(note.noteType==='checklist') return lines.map((line,index)=>`${note.checkedItems?.[index]?'[✓]':'[ ]'} ${line.replace(/^[-*☐☑]\s*/, '')}`).join('\n');
            return note.text || (note.audioId ? 'تسجيل صوتي محفوظ داخل التطبيق.' : '');
        };

        const NotesLibrary = ({ profile, onCelebrate }) => {
            const [notes, setNotes] = useState(collectAllNotes);
            const [weekFilter, setWeekFilter] = useState('all');
            const [query, setQuery] = useState('');
            const [showComposer, setShowComposer] = useState(false);
            const [newWeek, setNewWeek] = useState('none');
            const [newLecture, setNewLecture] = useState(lecturesData[0]?.lectures?.[0]?.id || '');
            const [newType, setNewType] = useState('text');
            const [newTitle, setNewTitle] = useState('');
            const [newText, setNewText] = useState('');
            const [pendingAudioBlob, setPendingAudioBlob] = useState(null);
            const [message, setMessage] = useState('');
            const [manualCopyText, setManualCopyText] = useState('');
            const refresh = () => setNotes(collectAllNotes());
            useEffect(() => { window.addEventListener('smarter-notes-updated', refresh); refresh(); return () => window.removeEventListener('smarter-notes-updated', refresh); }, []);
            const selectedWeek = newWeek === 'none' ? null : (lecturesData[Number(newWeek)] || lecturesData[0]);
            useEffect(() => { setNewLecture(selectedWeek?.lectures?.[0]?.id || ''); }, [newWeek]);
            const flash = (value) => { setMessage(value); window.setTimeout(() => setMessage(''), 3000); };
            const draftPayload = () => ({ kind: `ملاحظة — ${getNoteTypeLabel(newType)}`, title: newTitle.trim() || 'ملاحظة بدون عنوان', content: formatNoteContent({text:newText,noteType:newType,checkedItems:[]}), week: selectedWeek?.title || 'ملاحظة عامة', lecture: '' });
            const notePayload = note => ({ kind: `ملاحظة — ${getNoteTypeLabel(note.noteType)}`, title: note.title || 'ملاحظة بدون عنوان', content: formatNoteContent(note), week: note.weekTitle || (note.weekIndex >= 0 ? `الأسبوع ${Number(note.weekIndex) + 1}` : 'ملاحظة عامة'), lecture: note.lectureTitle, date: new Date(note.updatedAt || note.createdAt).toLocaleDateString('ar-EG') });
            const copyPayload = async payload => { const value = formatSmarterEntry(payload); const ok = await copyToClipboard(value); if (!ok) setManualCopyText(value); flash(ok ? 'تم نسخ المحتوى كاملًا.' : 'النص جاهز للنسخ اليدوي تحت.'); };
            const addNew = async () => {
                const body = newText.trim();
                if (!body && !pendingAudioBlob) return flash('اكتب ملاحظة أو سجّل ملاحظة صوتية الأول.');
                const weekIndex = newWeek === 'none' ? -1 : Number(newWeek); const week = weekIndex < 0 ? null : lecturesData[weekIndex];
                const lecture = week ? ((week.lectures || []).find(item => item.id === newLecture) || week.lectures?.[0]) : null;
                const noteId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
                const note = { id: noteId, title: newTitle.trim() || (pendingAudioBlob ? 'ملاحظة صوتية' : 'ملاحظة بدون عنوان'), text: body, noteType:newType, checkedItems:newType==='checklist'?noteLines({text:body}).map(()=>false):[], weekIndex, weekTitle: week?.title || 'ملاحظات عامة', lectureId: lecture?.id || 'personal', lectureTitle: lecture?.title || '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
                if (pendingAudioBlob) {
                    try { await saveAudioBlob(noteId, pendingAudioBlob); note.audioId = noteId; note.audioMimeType = pendingAudioBlob.type; }
                    catch (error) { return flash('تعذر حفظ التسجيل الصوتي على الجهاز.'); }
                }
                const key = lecture ? `smartLecture:${APP_STORAGE_NAMESPACE}:${lecture.id}:notes` : PERSONAL_NOTES_KEY; const list = safeJsonParse(localStorage.getItem(key), []); list.unshift(note);
                localStorage.setItem(key, JSON.stringify(list.slice(0, 300)));
                setNewTitle(''); setNewText(''); setPendingAudioBlob(null); setShowComposer(false); refresh(); dispatchSmarterEvent('smarter-notes-external-update', { lectureId: lecture?.id || 'personal' }); onCelebrate?.('note'); flash('تمت إضافة الملاحظة.');
            };
            const saveNoteChanges = note => { const checked=(note.noteType==='checklist'&&note.checkedItems?.length===noteLines(note).length)?note.checkedItems:noteLines(note).map((_,i)=>note.checkedItems?.[i]||false); updateStoredNote(note, { title: note.title, text: note.text, noteType:note.noteType||'text', checkedItems:checked }); flash(`تم حفظ تعديلات: ${note.title || 'الملاحظة'} 💚`); };
            const toggleChecklistItem = (note,index) => { const checked=noteLines(note).map((_,i)=>i===index?!note.checkedItems?.[i]:!!note.checkedItems?.[i]); updateStoredNote(note,{checkedItems:checked,noteType:'checklist'}); refresh(); };
            const removeNote = async note => { await deleteAudioBlob(note.audioId); removeStoredNote(note); refresh(); };
            const appendTranscript = transcript => setNewText(prev => `${prev}${prev.trim() ? ' ' : ''}${transcript}`);
            const filtered = notes.filter(note => (weekFilter === 'all' || String(note.weekIndex) === weekFilter) && (!query.trim() || `${note.title} ${note.text} ${note.weekTitle} ${note.lectureTitle} ${getNoteTypeLabel(note.noteType)}`.toLowerCase().includes(query.trim().toLowerCase())));
            const grouped = filtered.reduce((acc, note) => { (acc[note.weekIndex] ||= []).push(note); return acc; }, {});
            return (
                <div className="space-y-6">
                    <section className="content-card p-5 sm:p-7 rounded-xl shadow-md"><div className="flex flex-col lg:flex-row lg:items-center gap-4"><div className="p-3 rounded-xl bg-[--accent-navy] text-white w-fit"><Icon name="notebook-tabs" className="w-8 h-8" /></div><div className="flex-grow"><h2 className="text-2xl sm:text-3xl font-bold text-[--accent-navy] dark:text-white">مكتبة ملاحظات {profile.firstName}</h2><p className="text-gray-600 dark:text-gray-300 mt-1">ملاحظات نصية وصوتية، متقسمة حسب الأسبوع والمحاضرة وقابلة للتعديل والحفظ والنسخ في أي وقت.</p></div><span className="note-week-badge rounded-full px-4 py-2 font-bold text-sm">{notes.length} ملاحظة</span></div></section>

                    {showComposer&&<section className="notes-hub-card p-4 sm:p-5 space-y-4">
                        <h3 className="text-xl font-bold text-[--accent-navy] dark:text-white flex items-center gap-2"><Icon name="plus-circle" className="text-[--accent-green]" /> ملاحظة جديدة</h3>

                    <section className="grid sm:grid-cols-[1fr_220px] gap-3"><input className="app-field" value={query} onChange={e => setQuery(e.target.value)} placeholder="ابحث بالعنوان أو المحتوى أو نوع الملاحظة..." /><select className="app-field" value={weekFilter} onChange={e => setWeekFilter(e.target.value)}><option value="all">كل الملاحظات</option><option value="-1">ملاحظات عامة</option>{lecturesData.map((week, index) => <option key={week.title} value={index}>الأسبوع {index + 1}</option>)}</select></section>
                    {Object.keys(grouped).length === 0 ? <div className="notes-empty-state p-8 text-center"><Icon name="notebook-pen" className="w-12 h-12 text-[--accent-green] mx-auto mb-3" /><h3 className="font-bold text-xl text-[--accent-navy] dark:text-white">مفيش ملاحظات مطابقة</h3><p className="text-gray-500 dark:text-gray-400 mt-1">ابدأ أول ملاحظة من فوق أو من داخل أي محاضرة.</p></div> : Object.keys(grouped).sort((a,b) => Number(a)-Number(b)).map(key => {
                        const week = Number(key) >= 0 ? lecturesData[Number(key)] : null;
                        return <section key={key} className="space-y-3"><div className="flex items-center gap-3"><span className="note-week-badge px-3 py-1.5 rounded-full font-bold text-sm">{week?`الأسبوع ${Number(key)+1}`:'ملاحظات عامة'}</span>{week&&<h3 className="font-bold text-lg text-[--accent-navy] dark:text-white">{week.title.replace(/^الأسبوع\s*\d+\s*:\s*/, '')}</h3>}</div><div className="grid lg:grid-cols-2 gap-4">{grouped[key].map(note => <article key={`${note.storageKey}-${note.id}`} className="notes-hub-card p-4 space-y-3"><div className="flex justify-between gap-3"><div><div className="flex flex-wrap items-center gap-2"><span className="text-xs text-[--accent-green] font-bold">{note.lectureTitle||note.weekTitle}</span><span className="task-link-type">{getNoteTypeLabel(note.noteType)}</span></div><p className="text-[11px] text-gray-400 mt-1">آخر تعديل: {new Date(note.updatedAt || note.createdAt).toLocaleString('ar-EG')}</p></div><button onClick={() => removeNote(note)} className="text-red-500" title="حذف"><Icon name="trash-2" className="w-4 h-4" /></button></div><input className="app-field font-bold py-2" value={note.title} onChange={e => setNotes(prev => prev.map(row => row.id === note.id && row.storageKey === note.storageKey ? { ...row, title: e.target.value } : row))} /><select className="app-field py-2" value={note.noteType||'text'} onChange={e=>setNotes(prev=>prev.map(row=>row.id===note.id&&row.storageKey===note.storageKey?{...row,noteType:e.target.value}:row))}>{NOTE_TYPES.map(type=><option key={type.id} value={type.id}>{type.label}</option>)}</select><textarea className="app-field min-h-[110px] text-sm leading-relaxed" value={note.text || ''} placeholder={note.audioId ? 'أضف وصفًا للتسجيل الصوتي...' : 'محتوى الملاحظة'} onChange={e => setNotes(prev => prev.map(row => row.id === note.id && row.storageKey === note.storageKey ? { ...row, text: e.target.value } : row))} />{note.noteType==='checklist'&&noteLines(note).length>0&&<div className="space-y-2 bg-gray-50 dark:bg-slate-900 rounded-xl p-3">{noteLines(note).map((line,index)=><label key={index} className="flex items-start gap-3 cursor-pointer"><input type="checkbox" checked={!!note.checkedItems?.[index]} onChange={()=>toggleChecklistItem(note,index)} className="mt-1 w-5 h-5" /><span className={note.checkedItems?.[index]?'line-through text-gray-400':'text-[--accent-navy] dark:text-white'}>{line}</span></label>)}</div>}<AudioNotePlayer note={note} /><div className="flex flex-wrap gap-2"><button onClick={() => saveNoteChanges(note)} className="btn-brand-primary rounded-lg px-4 py-2 font-bold inline-flex items-center gap-2"><Icon name="save" className="w-4 h-4" /> حفظ التعديلات</button><button onClick={() => copyPayload(notePayload(note))} className="share-card-button"><Icon name="copy" className="w-4 h-4" /> نسخ الملاحظة كاملة</button><button onClick={() => downloadSmarterCard(notePayload(note))} className="share-card-button"><Icon name="image-down" className="w-4 h-4" /> حفظ كصورة</button></div></article>)}</div></section>;
                    })}

        };


        const ToolboxManager = () => {
            const [catalog, setCatalog] = useState(flattenToolsCatalog);

            const [categories, setCategories] = useState(() => safeJsonParse(localStorage.getItem(CUSTOM_TOOL_CATEGORIES_KEY), []));
            const [query, setQuery] = useState('');
            const [filter, setFilter] = useState('all');
            const [showExplorer, setShowExplorer] = useState(false);
            const [newCategory, setNewCategory] = useState('');
            const [newTool, setNewTool] = useState({ name:'', url:'', category:'' });
            const [message, setMessage] = useState('');
            const refresh = () => { setCatalog(flattenToolsCatalog()); setFavorites(safeJsonParse(localStorage.getItem(FAVORITE_TOOLS_KEY), [])); setCategories(safeJsonParse(localStorage.getItem(CUSTOM_TOOL_CATEGORIES_KEY), [])); };
            useEffect(() => { window.addEventListener('smarter-tools-updated', refresh); return () => window.removeEventListener('smarter-tools-updated', refresh); }, []);
            const flash = value => { setMessage(value); window.setTimeout(() => setMessage(''), 2800); };
            const toggleFavorite = tool => { const next = setToolFavorite(tool, !favorites.includes(toolIdentity(tool))); setFavorites(next); };
            const addCategory = () => { const value = newCategory.trim(); if (!value) return; const next = Array.from(new Set([...categories, value])); localStorage.setItem(CUSTOM_TOOL_CATEGORIES_KEY, JSON.stringify(next)); setCategories(next); setNewCategory(''); flash('اتضاف التصنيف الجديد.'); };
            const addTool = () => { if (!newTool.name.trim()) return flash('اكتب اسم الأداة.'); const tool = addCustomToolGlobal({ name:newTool.name.trim(), url:newTool.url.trim(), category:newTool.category.trim() || categories[0] || 'أدواتي الخاصة' }); setCatalog(flattenToolsCatalog()); setFavorites(setToolFavorite(tool, true)); setNewTool({ name:'', url:'', category:'' }); flash('اتضافت الأداة واتحفظت في المفضلة.'); };
            const favoriteTools = catalog.filter(tool => favorites.includes(toolIdentity(tool)));
            const allCategories = ['all', ...Array.from(new Set([...catalog.map(tool => tool.category).filter(Boolean), ...categories]))];
            const filtered = catalog.filter(tool => (filter === 'all' || tool.category === filter) && (!query.trim() || `${tool.name} ${tool.category}`.toLowerCase().includes(query.toLowerCase()))).slice(0, 160);
            return <section className="space-section space-y-5">
                <div className="flex flex-col lg:flex-row lg:items-center gap-3"><div className="p-3 rounded-xl bg-[--accent-navy] text-white w-fit"><Icon name="boxes" className="w-7 h-7" /></div><div className="flex-grow"><h3 className="space-section-heading">صندوق أدواتي المفضل</h3><p className="text-sm text-gray-500 dark:text-gray-300 mt-1">اجمع الأدوات اللي بترجع لها فعلًا، وصنّفها بطريقتك. الأدوات دي كمان بتظهر لك وأنت بتوثق أي تاسك.</p></div><button type="button" onClick={() => setShowExplorer(prev => !prev)} className="btn-brand-navy px-4 py-2.5 rounded-lg font-bold inline-flex items-center justify-center gap-2"><Icon name={showExplorer ? 'chevron-up' : 'plus'} className="w-4 h-4" /> {showExplorer ? 'إخفاء الإدارة' : 'إضافة وإدارة الأدوات'}</button></div>
                {favoriteTools.length ? <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">{favoriteTools.map(tool => <article key={toolIdentity(tool)} className="favorite-tool-card"><div className="flex items-start justify-between gap-2"><div><strong className="block text-[--accent-navy] dark:text-white">{tool.name}</strong><span className="text-xs text-[--accent-green] font-bold mt-1 block">{tool.category}</span></div><button type="button" onClick={() => toggleFavorite(tool)} className="text-yellow-500" title="إزالة من المفضلة"><Icon name="star" className="w-5 h-5 fill-current" /></button></div>{tool.url && <a href={tool.url} target="_blank" rel="noopener noreferrer" className="lecture-chip-button rounded-lg px-3 py-2 font-bold text-sm inline-flex items-center gap-2 mt-3"><Icon name="external-link" className="w-4 h-4" /> فتح الأداة</a>}</article>)}</div> : <div className="notes-empty-state p-6 text-center"><Icon name="star" className="w-9 h-9 text-[--accent-green] mx-auto mb-2" /><strong className="block text-[--accent-navy] dark:text-white">صندوقك لسه فاضي</strong><p className="text-sm text-gray-500 dark:text-gray-300 mt-1">افتح الإدارة واختار الأدوات اللي بتستخدمها فعلًا.</p></div>}

                    <div className="grid md:grid-cols-[1fr_230px] gap-2"><input className="app-field" value={query} onChange={e => setQuery(e.target.value)} placeholder="ابحث في كل أدوات الدبلومة..." /><select className="app-field" value={filter} onChange={e => setFilter(e.target.value)}>{allCategories.map(cat => <option key={cat} value={cat}>{cat === 'all' ? 'كل التصنيفات' : cat}</option>)}</select></div>
                    <div className="tool-picker-grid">{filtered.map(tool => { const favorite = favorites.includes(toolIdentity(tool)); return <article key={toolIdentity(tool)} className={`tool-pick-card ${favorite ? 'selected' : ''}`}><div className="flex items-start justify-between gap-2"><div><strong className="block text-sm text-[--accent-navy] dark:text-white">{tool.name}</strong><span className="text-xs text-gray-500 dark:text-gray-300 mt-1 block">{tool.category}</span></div><button type="button" onClick={() => toggleFavorite(tool)} className={favorite ? 'text-yellow-500' : 'text-gray-400'}><Icon name="star" className={`w-5 h-5 ${favorite ? 'fill-current' : ''}`} /></button></div>{tool.url && <a href={tool.url} target="_blank" rel="noopener noreferrer" className="text-xs font-bold text-[--accent-green] inline-flex items-center gap-1 mt-3"><Icon name="external-link" className="w-3.5 h-3.5" /> فتح</a>}</article>})}</div>
                </div>}
                {message && <p className="text-sm font-bold text-[--accent-green]">{message}</p>}
